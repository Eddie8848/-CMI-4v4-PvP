<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4v4 决斗竞技场</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #05080f;
  --panel: #0d1320;
  --panel2: #111927;
  --border: #1e2d45;
  --accent: #00d4ff;
  --accent2: #ff2d6b;
  --accent3: #ffd700;
  --green: #00ff88;
  --purple: #c084fc;
  --text: #d4e8ff;
  --text2: #6b8aaa;
  --red: #ff3b3b;
  --orange: #ff8800;
  --gold: #ffd700;
  --glow: 0 0 20px rgba(0,212,255,0.3);
  --glow2: 0 0 20px rgba(255,45,107,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(0,212,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,45,107,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ========== TITLE SCREEN ========== */
#title-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; position: relative; z-index: 1;
  gap: 40px; padding: 40px;
}

.title-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 6vw, 5rem);
  font-weight: 900;
  text-align: center;
  line-height: 1.1;
}

.title-logo .main { color: var(--accent); text-shadow: 0 0 30px rgba(0,212,255,0.8); }
.title-logo .sub { color: var(--accent2); font-size: 0.4em; letter-spacing: 0.3em; text-shadow: 0 0 20px rgba(255,45,107,0.8); }
.title-logo .ver { color: var(--text2); font-size: 0.25em; letter-spacing: 0.5em; margin-top: 8px; }

.title-art {
  font-size: 4rem;
  filter: drop-shadow(0 0 20px rgba(0,212,255,0.5));
  animation: float 3s ease-in-out infinite;
}

@keyframes float { 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-15px) } }

.title-desc {
  text-align: center; color: var(--text2);
  max-width: 500px; line-height: 1.8;
  font-size: 0.9rem;
}

.btn {
  padding: 14px 40px;
  border: none; border-radius: 4px;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.1em;
  position: relative; overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.4s;
}

.btn:hover::after { left: 100%; }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #0088cc);
  color: #000; box-shadow: 0 0 30px rgba(0,212,255,0.4);
}
.btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(0,212,255,0.7); }

.btn-secondary {
  background: transparent;
  color: var(--text2); border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.btn-danger {
  background: linear-gradient(135deg, var(--accent2), #880022);
  color: #fff; box-shadow: 0 0 20px rgba(255,45,107,0.3);
}
.btn-danger:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(255,45,107,0.6); }

.btn-gold {
  background: linear-gradient(135deg, var(--gold), #cc8800);
  color: #000;
}
.btn-gold:hover { transform: scale(1.05); }

.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

/* ========== CHARACTER SELECT ========== */
#select-screen {
  display: none; position: relative; z-index: 1;
  padding: 20px; max-width: 1200px; margin: 0 auto;
}

.select-header {
  text-align: center; padding: 30px 0 20px;
  font-family: 'Orbitron', sans-serif;
}

.select-header h1 { font-size: 1.8rem; color: var(--accent); }
.select-header p { color: var(--text2); margin-top: 8px; }

.select-team-indicator {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; margin: 20px 0;
  font-size: 1rem; font-weight: 700;
}

.team-badge {
  padding: 6px 20px; border-radius: 4px;
  font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
}

.team-badge.team1 { background: rgba(0,212,255,0.15); border: 1px solid var(--accent); color: var(--accent); }
.team-badge.team2 { background: rgba(255,45,107,0.15); border: 1px solid var(--accent2); color: var(--accent2); }
.team-badge.active { opacity: 1; transform: scale(1.1); }
.team-badge:not(.active) { opacity: 0.4; }

.roster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px; margin: 20px 0;
}

.char-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
  cursor: pointer; transition: all 0.2s;
  text-align: center; position: relative;
  overflow: hidden;
}

.char-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--glow); }
.char-card.selected-1 { border-color: var(--accent); background: rgba(0,212,255,0.1); }
.char-card.selected-2 { border-color: var(--accent2); background: rgba(255,45,107,0.1); }
.char-card.disabled { opacity: 0.3; cursor: not-allowed; }

.char-card-emoji { font-size: 2.5rem; margin-bottom: 8px; }
.char-card-name { font-weight: 700; font-size: 0.95rem; }
.char-card-rarity {
  font-size: 0.7rem; letter-spacing: 0.2em;
  margin-top: 4px; font-family: 'Orbitron', sans-serif;
}

.rarity-SP { color: #c084fc; }
.rarity-SSR { color: var(--gold); }
.rarity-SR { color: #94a3b8; }
.rarity-UR { color: #ff2d6b; }
.rarity-God { color: #ffd700; text-shadow: 0 0 10px gold; }

.char-card-role {
  font-size: 0.7rem; color: var(--text2); margin-top: 4px;
}

.selected-teams {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; margin: 20px 0;
}

.selected-team-panel {
  background: var(--panel); border-radius: 8px;
  padding: 16px; border: 1px solid var(--border);
}

.selected-team-panel h3 {
  font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
  margin-bottom: 12px;
}

.team1-panel h3 { color: var(--accent); }
.team2-panel h3 { color: var(--accent2); }

.selected-slot {
  background: var(--panel2); border-radius: 4px;
  padding: 8px 12px; margin: 6px 0;
  border: 1px dashed var(--border);
  display: flex; align-items: center; gap: 10px;
  min-height: 42px; font-size: 0.9rem;
}

.selected-slot.filled { border-style: solid; }
.selected-slot .slot-emoji { font-size: 1.2rem; }
.selected-slot .slot-name { font-weight: 700; }
.selected-slot .slot-rarity { font-size: 0.7rem; }

/* ========== BATTLE SCREEN ========== */
#battle-screen {
  display: none; position: relative; z-index: 1;
  min-height: 100vh;
  display: none;
  flex-direction: column;
}

.battle-header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
}

.battle-header-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem; color: var(--text2);
  letter-spacing: 0.2em;
}

.round-display {
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem; color: var(--accent);
  font-weight: 700;
}

.turn-display {
  font-size: 0.85rem; color: var(--text2);
}

.battle-main {
  flex: 1; display: flex; flex-direction: column;
  padding: 15px; gap: 10px;
  max-width: 1400px; margin: 0 auto; width: 100%;
}

.teams-area {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.team-panel {
  background: var(--panel); border-radius: 8px;
  padding: 12px; border: 1px solid var(--border);
}

.team-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
  letter-spacing: 0.3em; margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.team-label.t1 { color: var(--accent); }
.team-label.t2 { color: var(--accent2); }

/* Character row in battle */
.battle-char {
  background: var(--panel2); border-radius: 6px;
  padding: 10px; margin-bottom: 8px;
  border: 1px solid var(--border);
  transition: all 0.2s; cursor: default;
  position: relative;
}

.battle-char.active-actor {
  border-color: var(--accent3);
  box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.battle-char.active-target {
  border-color: var(--accent2);
  box-shadow: 0 0 15px rgba(255,45,107,0.3);
  cursor: crosshair;
}

.battle-char.active-target:hover {
  background: rgba(255,45,107,0.1);
}

.battle-char.ally-target {
  border-color: var(--green);
  box-shadow: 0 0 15px rgba(0,255,136,0.3);
  cursor: pointer;
}

.battle-char.ally-target:hover {
  background: rgba(0,255,136,0.08);
}

.battle-char.dead {
  opacity: 0.25; filter: grayscale(1);
  pointer-events: none;
}

.battle-char.stunned { border-color: #888; }

.char-row-top {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}

.char-emoji-sm { font-size: 1.5rem; }

.char-info-sm { flex: 1; min-width: 0; }
.char-info-sm .name { font-weight: 700; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-info-sm .rarity { font-size: 0.65rem; font-family: 'Orbitron', sans-serif; }

.char-stats-right {
  display: flex; align-items: center; gap: 8px; font-size: 0.75rem;
}

.stamina-dots {
  display: flex; gap: 3px;
}

.stamina-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border);
}

.stamina-dot.filled { background: var(--accent3); box-shadow: 0 0 4px rgba(255,215,0,0.6); }

.trigger-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem; color: var(--purple);
  min-width: 30px; text-align: right;
}

.trigger-val.ready { color: var(--accent3); text-shadow: 0 0 8px rgba(255,215,0,0.8); }

/* HP Bar */
.hp-bar-wrap {
  margin-bottom: 4px;
}

.bar-labels {
  display: flex; justify-content: space-between;
  font-size: 0.65rem; color: var(--text2); margin-bottom: 2px;
}

.bar-track {
  height: 8px; background: rgba(255,255,255,0.05);
  border-radius: 4px; overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.4s ease;
}

.hp-fill { background: linear-gradient(90deg, #00ff88, #00cc44); }
.hp-fill.warn { background: linear-gradient(90deg, #ff8800, #cc5500); }
.hp-fill.crit { background: linear-gradient(90deg, #ff3b3b, #990000); }

.shield-fill { background: linear-gradient(90deg, #60a5fa, #2563eb); }

/* Status effects */
.status-row {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;
}

.status-badge {
  font-size: 0.6rem; padding: 1px 6px;
  border-radius: 3px; font-weight: 700;
  letter-spacing: 0.05em;
}

.status-badge.buff { background: rgba(0,255,136,0.2); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
.status-badge.debuff { background: rgba(255,59,59,0.2); color: var(--red); border: 1px solid rgba(255,59,59,0.3); }
.status-badge.special { background: rgba(192,132,252,0.2); color: var(--purple); border: 1px solid rgba(192,132,252,0.3); }

/* ========== LOG AREA ========== */
.log-area {
  background: var(--panel); border-radius: 8px;
  border: 1px solid var(--border); padding: 12px;
  height: 160px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 3px;
}

.log-entry {
  font-size: 0.78rem; line-height: 1.5;
  padding: 2px 0;
  color: var(--text2);
  border-bottom: 1px solid rgba(255,255,255,0.02);
  animation: logIn 0.3s ease;
}

@keyframes logIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; } }

.log-entry.combat { color: #ffa0a0; }
.log-entry.skill { color: #a0d4ff; }
.log-entry.ultimate { color: var(--gold); font-weight: 700; }
.log-entry.heal { color: var(--green); }
.log-entry.system { color: var(--accent); font-weight: 700; }
.log-entry.death { color: #ff3b3b; font-weight: 700; }
.log-entry.round { color: var(--text2); text-align: center; padding: 6px 0; border-top: 1px solid var(--border); }

/* ========== ACTION PANEL ========== */
.action-panel {
  background: var(--panel); border-radius: 8px;
  border: 1px solid var(--border); padding: 15px;
}

.action-panel-title {
  font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
  color: var(--text2); letter-spacing: 0.2em; margin-bottom: 12px;
}

.action-panel-title .actor-name { color: var(--accent3); font-weight: 700; }

.skills-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px; margin-bottom: 10px;
}

.skill-btn {
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
  cursor: pointer; transition: all 0.2s; text-align: left;
  color: var(--text);
  position: relative; overflow: hidden;
}

.skill-btn:hover:not(:disabled) {
  border-color: var(--accent); background: rgba(0,212,255,0.08);
  transform: translateY(-2px);
}

.skill-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.skill-btn.ult-btn { border-color: var(--gold); background: rgba(255,215,0,0.08); }
.skill-btn.ult-btn:hover:not(:disabled) { background: rgba(255,215,0,0.15); box-shadow: 0 0 15px rgba(255,215,0,0.3); }

.skill-btn.recall-btn { border-color: var(--purple); }
.skill-btn.recall-btn:hover:not(:disabled) { background: rgba(192,132,252,0.1); }

.skill-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 3px; }
.skill-desc { font-size: 0.68rem; color: var(--text2); line-height: 1.4; }
.skill-cost {
  position: absolute; top: 8px; right: 8px;
  font-size: 0.65rem; font-family: 'Orbitron', sans-serif;
}
.skill-cost .cost-sp { color: var(--accent3); }
.skill-cost .cost-tv { color: var(--purple); font-size: 0.6rem; }

.target-prompt {
  background: rgba(255,45,107,0.1); border: 1px solid rgba(255,45,107,0.3);
  border-radius: 6px; padding: 12px; text-align: center;
  color: var(--accent2); font-size: 0.9rem;
  animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.6 } }

.action-buttons-row {
  display: flex; gap: 10px; margin-top: 10px;
}

/* ========== RESULT SCREEN ========== */
#result-screen {
  display: none; position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(5,8,15,0.95); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 30px;
}

.result-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2.5rem, 8vw, 6rem);
  font-weight: 900; text-align: center;
}

.result-title.win { color: var(--accent); text-shadow: 0 0 40px rgba(0,212,255,0.8); }
.result-title.lose { color: var(--accent2); text-shadow: 0 0 40px rgba(255,45,107,0.8); }
.result-title.draw { color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.8); }

.result-sub {
  color: var(--text2); font-size: 1.1rem; text-align: center;
}

.damage-flash {
  animation: dmgFlash 0.3s ease;
}

@keyframes dmgFlash {
  0% { background: rgba(255,59,59,0.4); }
  100% { background: transparent; }
}

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .teams-area { grid-template-columns: 1fr; }
  .selected-teams { grid-template-columns: 1fr; }
  .skills-row { grid-template-columns: 1fr 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Overlay for target selection */
.target-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,45,107,0.05);
  z-index: 10; pointer-events: none;
  border: 2px solid rgba(255,45,107,0.3);
}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-art">⚔️</div>
  <div class="title-logo">
    <div class="main">4v4 ARENA</div>
    <div class="sub">决斗竞技场</div>
    <div class="ver">BATTLE SYSTEM v1.0</div>
  </div>
  <div class="title-desc">
    组建你的4人队伍，与对手展开激烈的战略对决。<br>
    每位角色拥有独特的技能、大招与回想。<br>
    触发值满10点即可释放大招！
  </div>
  <div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-primary" onclick="showSelectScreen()">▶ 开始游戏</button>
    <button class="btn btn-secondary" onclick="showRules()">📋 游戏规则</button>
  </div>
</div>

<!-- CHARACTER SELECT SCREEN -->
<div id="select-screen">
  <div class="select-header">
    <h1>⚔ 角色选择</h1>
    <p>每队选择4名角色参战</p>
  </div>

  <div class="select-team-indicator">
    <div class="team-badge team1 active" id="badge-t1">▶ 玩家队 (选0/4)</div>
    <div style="color:var(--text2)">VS</div>
    <div class="team-badge team2" id="badge-t2">敌方队 (选0/4)</div>
  </div>

  <div class="roster-grid" id="roster-grid"></div>

  <div class="selected-teams">
    <div class="selected-team-panel team1-panel">
      <h3>🔵 玩家队伍</h3>
      <div id="team1-slots"></div>
    </div>
    <div class="selected-team-panel team2-panel">
      <h3>🔴 对手队伍</h3>
      <div id="team2-slots"></div>
    </div>
  </div>

  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:20px 0;">
    <button class="btn btn-gold" id="btn-auto-enemy" onclick="autoPickEnemy()">🤖 AI随机敌队</button>
    <button class="btn btn-primary" id="btn-start-battle" onclick="startBattle()" disabled>⚔ 开始战斗</button>
    <button class="btn btn-secondary" onclick="showTitle()">← 返回</button>
  </div>
</div>

<!-- BATTLE SCREEN -->
<div id="battle-screen" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="battle-header">
    <div class="battle-header-title">4v4 ARENA · COMBAT</div>
    <div class="round-display" id="round-display">第 1 回合</div>
    <div class="turn-display" id="turn-display">准备中...</div>
  </div>

  <div class="battle-main">
    <div class="teams-area">
      <!-- Enemy team -->
      <div class="team-panel">
        <div class="team-label t2">🔴 ENEMY TEAM</div>
        <div id="team2-battle"></div>
      </div>
      <!-- Player team -->
      <div class="team-panel">
        <div class="team-label t1">🔵 PLAYER TEAM</div>
        <div id="team1-battle"></div>
      </div>
    </div>

    <!-- Log -->
    <div class="log-area" id="battle-log"></div>

    <!-- Action Panel -->
    <div class="action-panel" id="action-panel">
      <div class="action-panel-title">等待战斗开始...</div>
      <div id="action-content"></div>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="result-title" id="result-title">胜利!</div>
  <div class="result-sub" id="result-sub">战斗结束</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-primary" onclick="showSelectScreen()">再战一局</button>
    <button class="btn btn-secondary" onclick="showTitle()">返回主菜单</button>
  </div>
</div>

<script>
// ====================================================
// CORE CONSTANTS
// ====================================================
const BASE_HP = 1000;
const BASE_DMG = 100;
const SHIELD_BLOCK = 0.5;
const HEADSHOT_CHANCE = 0.10;
const DODGE_CHANCE = 0.15;
const HEADSHOT_MULT = 1.50;
const TRIGGER_MAX = 10;
const STAMINA_MAX = 8;
const STAMINA_INIT = 5;

// ====================================================
// CHARACTER DEFINITIONS
// ====================================================
const CHAR_DEFS = {

// ====================================================
// BATTLE ENGINE
// ====================================================
class Battle {
  constructor(team1, team2) {
    this.teams = [team1, team2];
    this.round = 0;
    this.logs = [];
    this.isOver = false;
    this.winner = null; // 0=team1 wins, 1=team2 wins
    this.pendingAction = null; // { skill, actor } waiting for target
  }

  log(text, type='combat') {
    this.logs.push({ text, type });
    if(this.logs.length > 200) this.logs.shift();
  }

  getTeam(char) {
    return this.teams.find(t => t.some(c => c.id === char.id && c._uid === char._uid));
  }

  getEnemies(char) {
    return this.teams.find(t => !t.some(c => c.id === char.id && c._uid === char._uid))
      .filter(e => e.alive);
  }

  // Apply damage, returns actual damage dealt
  dealDmg(attacker, defender, mult, type, fixedDmg=null) {
    if(!defender.alive) return 0;

    // Hit location roll (only for physical/magic, not true)
    let finalMult = mult;
    let hitType = 'normal';

    if(type !== 'true' && fixedDmg === null) {
      const roll = Math.random();
      // Check dodge first
      const dodgeChance = DODGE_CHANCE + (defender.buffs.find(b=>b.type==='dodge_up')?.val||0);
      if(roll < dodgeChance) {
        this.log(`  ${defender.name} 闪避了攻击！`, 'combat');
        return 0;
      }
      // Check headshot
      const hsChance = HEADSHOT_CHANCE * (attacker._doubleHeadshot ? 2 : 1);
      if(roll >= dodgeChance && roll < dodgeChance + hsChance) {
        finalMult *= HEADSHOT_MULT;
        hitType = '🎯爆头';
      } else {
        hitType = Math.random() < 0.5 ? '上半身' : '腿部';
      }
    }

    // Base damage calc
    let atkStat = attacker.atk;

    // Attacker modifiers
    let atkMult = 1.0;
    // Passive atk bonus
    if(attacker._passiveAtkMult) atkMult *= attacker._passiveAtkMult;
    if(attacker._passiveAtk) atkStat += attacker.atk * attacker._passiveAtk / 100;
    if(attacker._rageBonus) atkMult += attacker._rageBonus;

    // Buff: skill_up
    const skillUp = attacker.buffs.filter(b=>b.type==='skill_up').reduce((s,b)=>s+b.val, 0);
    atkMult += skillUp;

    // saint_mode
    const saintMode = attacker.buffs.find(b=>b.type==='saint_mode');
    if(saintMode) atkMult += saintMode.val;

    // kidney_warrior
    const kidneyW = attacker.buffs.find(b=>b.type==='kidney_warrior');
    if(kidneyW) atkMult += kidneyW.val;

    // egg_power
    const eggPow = attacker.buffs.find(b=>b.type==='egg_power');
    if(eggPow) atkMult += eggPow.val;

    // duel prints bonus
    const duelPrints = attacker.stats?.duelPrints||0;
    atkMult += duelPrints * 0.03;

    // crit_sure (zero domain)
    if(attacker.buffs.find(b=>b.type==='crit_sure') && type !== 'true') {
      finalMult *= 1.5;
    }

    // resonance stacks (omega)
    const resStacks = attacker.stats?.resonanceStacks||0;
    atkMult += resStacks * 0.10;

    // AP+ buff (lua recall)
    const apPlus = attacker.buffs.find(b=>b.type==='ap_plus');
    if(apPlus && apPlus.count > 0 && type !== 'true') {
      finalMult += apPlus.val;
      apPlus.count--;
      if(apPlus.count <= 0) attacker.buffs = attacker.buffs.filter(b=>b.type!=='ap_plus');
    }

    // compute raw damage
    let rawDmg;
    if(fixedDmg !== null) {
      rawDmg = fixedDmg;
    } else if(type === 'true') {
      // True damage = percentage of defender maxHp
      rawDmg = Math.floor(defender.maxHp * finalMult);
    } else {
      rawDmg = Math.floor(atkStat * finalMult * atkMult);
    }

    // Defender debuff: marked
    const marked = defender.debuffs.find(d=>d.type==='marked');
    if(marked) rawDmg = Math.floor(rawDmg * (1 + marked.val));

    // Defender debuff: dmg_down
    const dmgDown = defender.debuffs.filter(d=>d.type==='dmg_down').reduce((s,d)=>s+d.val,0);
    rawDmg = Math.floor(rawDmg * (1 - Math.min(dmgDown, 0.8)));

    // Defender passive def mult (lua passive)
    if(defender._passiveDefMult) rawDmg = Math.floor(rawDmg * defender._passiveDefMult);

    // Taunt/reflect
    const reflect = defender.buffs.find(b=>b.type==='dmg_reduce_reflect');
    if(reflect) {
      const reflectAmt = Math.floor(rawDmg * reflect.val);
      rawDmg = Math.floor(rawDmg * (1 - reflect.val));
      // Reflect to attacker
      if(reflectAmt > 0) this.applyHpDmg(attacker, reflectAmt);
    }

    // Duel mark: reflect 20% to attacker
    const duelMark = defender.debuffs.find(d=>d.type==='duel_mark');
    if(duelMark && type !== 'true') {
      const rb = Math.floor(rawDmg * duelMark.val);
      this.applyHpDmg(attacker, rb);
    }

    // Apply damage to shield then HP
    let actualDmg = 0;
    if(type === 'true') {
      // True damage bypasses shield
      actualDmg = rawDmg;
      this.applyHpDmg(defender, actualDmg);
    } else {
      // Shield blocks 50%
      if(defender.shield > 0) {
        const shieldAbsorb = Math.floor(rawDmg * SHIELD_BLOCK);
        const hpDmg = rawDmg - shieldAbsorb;
        const actualShieldDmg = Math.min(defender.shield, shieldAbsorb);
        defender.shield -= actualShieldDmg;
        this.applyHpDmg(defender, hpDmg);
        actualDmg = rawDmg;
      } else {
        this.applyHpDmg(defender, rawDmg);
        actualDmg = rawDmg;
      }
    }

    return actualDmg;
  }

  applyHpDmg(char, dmg) {
    if(dmg <= 0 || !char.alive) return;
    char.hp -= dmg;
    if(char.hp <= 0) {
      // Omega special: residual echo
      if(char.id === 'omega' && char.alive && !char._echoActive) {
        char._echoActive = true;
        char._echoDur = 2;
        char.alive = true;
        char.hp = 1;
        char.debuffs.push({ type:'residual_echo', dur:2 });
        this.log(`🎵 ${char.name}进入残响态！2回合后复活！`, 'system');
        return;
      }
      char.hp = 0;
      char.alive = false;
      this.log(`☠ ${char.name} 阵亡！`, 'death');
    }
  }

  healChar(char, amount) {
    if(!char.alive) return 0;
    const overage = (char.hp + amount) - char.maxHp;
    if(overage > 0) {
      char.hp = char.maxHp;
      char.shield += overage; // overflow becomes shield
      return amount;
    } else {
      char.hp = Math.min(char.hp + amount, char.maxHp);
      return amount;
    }
  }

  addBuff(char, type, opts) {
    if(!char.alive) return;
    char.buffs.push({ type, ...opts });
  }

  addDebuff(char, type, opts) {
    if(!char.alive) return;
    // Omega absorbs debuffs as resonance stacks
    if(char.id === 'omega') {
      char.stats.resonanceStacks = (char.stats.resonanceStacks||0) + 2;
      this.log(`  Ω吸收控制→共鸣印+2（共${char.stats.resonanceStacks}层）`, 'system');
      return;
    }
    char.debuffs.push({ type, ...opts });
  }

  tickStatusEffects(char) {
    if(!char.alive) return;

    // Tick burn/bleed DoT
    const burnDebuffs = char.debuffs.filter(d=>d.type==='burn'||d.type==='bleed');
    burnDebuffs.forEach(b => {
      if(b.src && b.src.alive) {
        const d = this.dealDmg(b.src, char, b.val, 'magic');
        this.log(`  🔥 ${char.name}持续伤害: ${d}法伤`, 'combat');
      }
    });

    // Tick residual echo
    if(char._echoActive) {
      char._echoDur--;
      if(char._echoDur <= 0) {
        char._echoActive = false;
        char.hp = char.maxHp;
        char.debuffs = char.debuffs.filter(d=>d.type!=='residual_echo');
        this.log(`🎵 ${char.name}从残响态复活！`, 'heal');
      }
    }

    // Decay durations
    char.buffs.forEach(b => { if(b.dur && b.dur !== 999) b.dur--; });
    char.debuffs.forEach(d => { if(d.dur) d.dur--; });
    char.buffs = char.buffs.filter(b => b.dur === undefined || b.dur === 999 || b.dur > 0);
    char.debuffs = char.debuffs.filter(d => d.dur === undefined || d.dur > 0);

    // Recover stamina
    char.stamina = Math.min(char.stamina + 1, char.maxStamina);
  }

  checkWin() {
    const t0alive = this.teams[0].some(c=>c.alive);
    const t1alive = this.teams[1].some(c=>c.alive);
    if(!t0alive && !t1alive) { this.isOver=true; this.winner=-1; return true; }
    if(!t0alive) { this.isOver=true; this.winner=1; return true; }
    if(!t1alive) { this.isOver=true; this.winner=0; return true; }
    return false;
  }
}

let gameState = {
  screen: 'title',
  selectedTeam1: [],
  selectedTeam2: [],
  selectingForTeam: 1,
  battle: null,
  turnQueue: [],
  currentTurnIdx: 0,
  awaitingTarget: null, // { skill, actor }
  awaitingUlt: false,
  phase: 'idle', // 'player_turn', 'ai_turn', 'awaiting_target'
};

let _uid = 0;
function makeCharInstance(def) {
  return {
    ...def,
    _uid: ++_uid,
    hp: def.hp,
    maxHp: def.hp,
    shield: def.initShield || 0,
    stamina: def.initStamina,
    maxStamina: def.maxStamina,
    triggerValue: 0,
    alive: true,
    buffs: [],
    debuffs: [],
    stats: { ...(def.initStats||{}) },
    recallUsed: false,
    _passiveAtkMult: 1,
    _passiveDefMult: 1,
    _passiveAtk: 0,
    _rageBonus: 0,
    _luaPassiveApplied: false,
  };
}

// Build turn queue: interleaved t1[0],t2[0],t1[1],t2[1],...
function buildTurnQueue(teams) {
  const queue = [];
  for(let i=0;i<4;i++) {
    queue.push({ teamIdx:0, charIdx:i });
    queue.push({ teamIdx:1, charIdx:i });
  }
  return queue;
}

function showSelectScreen() {
  gameState.selectedTeam1 = [];
  gameState.selectedTeam2 = [];
  gameState.selectingForTeam = 1;
  document.getElementById('title-screen').style.display='none';
  document.getElementById('select-screen').style.display='block';
  document.getElementById('battle-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  renderSelectScreen();
}

function renderSelectScreen() {
  // Roster grid
  const grid = document.getElementById('roster-grid');
  grid.innerHTML = '';
  CHAR_LIST.forEach(def => {
    const inTeam1 = gameState.selectedTeam1.includes(def.id);
    const inTeam2 = gameState.selectedTeam2.includes(def.id);
    const disabled = inTeam1 || inTeam2;
    const div = document.createElement('div');
    div.className = `char-card ${inTeam1?'selected-1':''} ${inTeam2?'selected-2':''} ${disabled&&!(inTeam1||inTeam2)?'disabled':''}`;
    div.innerHTML = `
      <div class="char-card-emoji">${def.emoji}</div>
      <div class="char-card-name">${def.name.replace(/ (SSR|SR|SP|UR|God)$/,'')}</div>
      <div class="char-card-rarity rarity-${def.rarity}">${def.rarity} · ${def.role}</div>
      <div class="char-card-role" style="font-size:0.6rem;margin-top:4px;opacity:0.7">${def.passiveInfo.slice(0,40)}...</div>
    `;
    if(!disabled) div.onclick = () => selectChar(def.id);
    grid.appendChild(div);
  });

  // Team slots
  renderTeamSlots('team1-slots', gameState.selectedTeam1, 'team1');
  renderTeamSlots('team2-slots', gameState.selectedTeam2, 'team2');

  // Badges
  document.getElementById('badge-t1').textContent = `${gameState.selectingForTeam===1?'▶ ':''}玩家队 (选${gameState.selectedTeam1.length}/4)`;
  document.getElementById('badge-t2').textContent = `${gameState.selectingForTeam===2?'▶ ':''}对手队 (选${gameState.selectedTeam2.length}/4)`;
  document.getElementById('badge-t1').className = `team-badge team1 ${gameState.selectingForTeam===1?'active':''}`;
  document.getElementById('badge-t2').className = `team-badge team2 ${gameState.selectingForTeam===2?'active':''}`;

  // Start button
  document.getElementById('btn-start-battle').disabled = !(gameState.selectedTeam1.length===4 && gameState.selectedTeam2.length===4);
}

function renderTeamSlots(containerId, team, teamClass) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  for(let i=0;i<4;i++) {
    const slot = document.createElement('div');
    const def = team[i] ? CHAR_DEFS[team[i]] : null;
    slot.className = `selected-slot ${def?'filled':''}`;
    if(def) {
      slot.innerHTML = `<span class="slot-emoji">${def.emoji}</span><div><div class="slot-name">${def.name.replace(/ (SSR|SR|SP|UR|God)$/,'')}</div><div class="slot-rarity rarity-${def.rarity}">${def.rarity}</div></div>`;
      slot.onclick = () => removeFromTeam(team, def.id, teamClass);
      slot.style.cursor = 'pointer';
      slot.title = '点击移除';
    } else {
      slot.innerHTML = `<span style="color:var(--text2);font-size:0.8rem">空位 ${i+1}</span>`;
    }
    el.appendChild(slot);
  }
}

function selectChar(charId) {
  if(gameState.selectingForTeam === 1) {
    if(gameState.selectedTeam1.length < 4 && !gameState.selectedTeam1.includes(charId)) {
      gameState.selectedTeam1.push(charId);
      if(gameState.selectedTeam1.length === 4) gameState.selectingForTeam = 2;
    }
  } else {
    if(gameState.selectedTeam2.length < 4 && !gameState.selectedTeam2.includes(charId)) {
      gameState.selectedTeam2.push(charId);
    }
  }
  renderSelectScreen();
}

function removeFromTeam(team, charId, teamClass) {
  const idx = team.indexOf(charId);
  if(idx > -1) team.splice(idx, 1);
  if(teamClass === 'team1') gameState.selectingForTeam = 1;
  renderSelectScreen();
}

function autoPickEnemy() {
  const available = CHAR_LIST.map(d=>d.id).filter(id=>!gameState.selectedTeam1.includes(id));
  gameState.selectedTeam2 = [];
  while(gameState.selectedTeam2.length < 4 && available.length > 0) {
    const idx = Math.floor(Math.random() * available.length);
    gameState.selectedTeam2.push(available.splice(idx, 1)[0]);
  }
  renderSelectScreen();
}

// ====================================================
// BATTLE START
// ====================================================
function startBattle() {
  const team1 = gameState.selectedTeam1.map(id => makeCharInstance(CHAR_DEFS[id]));
  const team2 = gameState.selectedTeam2.map(id => makeCharInstance(CHAR_DEFS[id]));

  gameState.battle = new Battle(team1, team2);
  gameState.turnQueue = buildTurnQueue([team1, team2]);
  gameState.currentTurnIdx = 0;
  gameState.awaitingTarget = null;
  gameState.phase = 'idle';

  document.getElementById('select-screen').style.display='none';
  document.getElementById('battle-screen').style.display='flex';

  gameState.battle.log('⚔️ 战斗开始！', 'system');
  startRound();
}

function startRound() {
  gameState.battle.round++;
  gameState.battle.log(`━━━ 第 ${gameState.battle.round} 回合 ━━━`, 'round');
  document.getElementById('round-display').textContent = `第 ${gameState.battle.round} 回合`;

  // Apply passive tick for all chars
  gameState.battle.teams.forEach(team => {
    team.forEach(char => {
      if(char.alive) {
        // Apply char-specific passive
        const def = CHAR_DEFS[char.id];
        if(def.applyPassive) def.applyPassive(char, gameState.battle);
        // Tick status effects
        gameState.battle.tickStatusEffects(char);
      }
    });
  });

  gameState.currentTurnIdx = 0;
  advanceTurn();
}

function advanceTurn() {
  if(gameState.battle.checkWin()) {
    endBattle(); return;
  }

  // Find next alive character
  while(gameState.currentTurnIdx < gameState.turnQueue.length) {
    const entry = gameState.turnQueue[gameState.currentTurnIdx];
    const char = gameState.battle.teams[entry.teamIdx][entry.charIdx];
    if(char && char.alive) break;
    gameState.currentTurnIdx++;
  }

  if(gameState.currentTurnIdx >= gameState.turnQueue.length) {
    // End of round
    renderBattleUI();
    setTimeout(startRound, 400);
    return;
  }

  const entry = gameState.turnQueue[gameState.currentTurnIdx];
  const char = gameState.battle.teams[entry.teamIdx][entry.charIdx];

  document.getElementById('turn-display').textContent = `${char.name} 的回合`;

  // Check if stunned/frozen/silenced
  const stunned = char.debuffs.find(d=>d.type==='stun'||d.type==='freeze'||d.type==='fear'||d.type==='offstage');
  if(stunned) {
    gameState.battle.log(`⚡ ${char.name} 被${stunned.type==='stun'?'眩晕':stunned.type==='freeze'?'冰冻':stunned.type==='fear'?'恐惧':'退场'}，跳过行动`, 'combat');
    gameState.currentTurnIdx++;
    renderBattleUI();
    setTimeout(advanceTurn, 600);
    return;
  }

  // Check doubt
  const doubt = char.debuffs.find(d=>d.type==='doubt');
  if(doubt && Math.random() < 0.5) {
    gameState.battle.log(`❓ ${char.name} 在Doubt状态下行动失败！`, 'combat');
    gameState.currentTurnIdx++;
    renderBattleUI();
    setTimeout(advanceTurn, 600);
    return;
  }

  if(entry.teamIdx === 0) {
    // Player turn
    gameState.phase = 'player_turn';
    renderBattleUI();
    renderActionPanel(char);
  } else {
    // AI turn
    gameState.phase = 'ai_turn';
    renderBattleUI();
    setTimeout(() => aiTakeTurn(char), 800);
  }
}

// ====================================================
// PLAYER ACTION
// ====================================================
function renderActionPanel(char) {
  const panel = document.getElementById('action-panel');
  const title = `<div class="action-panel-title">行动中：<span class="actor-name">${char.emoji} ${char.name}</span> | 体力 ${char.stamina}/${char.maxStamina} | 触发 ${char.triggerValue}/10</div>`;

  const def = CHAR_DEFS[char.id];
  const silenced = char.debuffs.find(d=>d.type==='silence');
  const noStamina = char.stamina === 0;

  let skillsHTML = '<div class="skills-row">';

  def.skills.forEach((sk, i) => {
    const canUse = !silenced && char.stamina >= sk.cost;
    const tvGain = `+${sk.tv}⚡`;
    skillsHTML += `
      <button class="skill-btn" ${canUse?'':'disabled'} onclick="playerUseSkill(${i})">
        <div class="skill-cost"><span class="cost-sp">💪${sk.cost}</span> <span class="cost-tv">${tvGain}</span></div>
        <div class="skill-name">${sk.name}</div>
        <div class="skill-desc">${sk.desc}</div>
      </button>`;
  });

  // Ultimate
  const freeUlt = char.buffs.find(b=>b.type==='free_ult');
  const canUlt = char.triggerValue >= TRIGGER_MAX || freeUlt;
  skillsHTML += `
    <button class="skill-btn ult-btn" ${canUlt?'':'disabled'} onclick="playerUseUlt()">
      <div class="skill-cost"><span style="color:var(--gold)">★大招</span></div>
      <div class="skill-name">${def.ultimate.name}</div>
      <div class="skill-desc">${def.ultimate.desc}</div>
    </button>`;

  // Recall
  const canRecall = !char.recallUsed;
  skillsHTML += `
    <button class="skill-btn recall-btn" ${canRecall?'':'disabled'} onclick="playerUseRecall()">
      <div class="skill-cost"><span style="color:var(--purple)">🃏回想</span></div>
      <div class="skill-name">${def.recall.name}</div>
      <div class="skill-desc">${def.recall.desc}</div>
    </button>`;

  skillsHTML += '</div>';

  panel.innerHTML = title + skillsHTML;
}

function playerUseSkill(skillIdx) {
  const entry = gameState.turnQueue[gameState.currentTurnIdx];
  const char = gameState.battle.teams[entry.teamIdx][entry.charIdx];
  const def = CHAR_DEFS[char.id];
  const skill = def.skills[skillIdx];

  if(char.stamina < skill.cost) return;

  // Check if needs target selection
  if(skill.targetType === 'single_enemy') {
    gameState.awaitingTarget = { skill, actor: char };
    gameState.phase = 'awaiting_target';
    renderBattleUI();
    showTargetPrompt(char, skill, 'enemy');
  } else if(skill.targetType === 'single_ally') {
    gameState.awaitingTarget = { skill, actor: char };
    gameState.phase = 'awaiting_ally_target';
    renderBattleUI();
    showTargetPrompt(char, skill, 'ally');
  } else {
    // All targets handled by skill
    executePlayerSkill(char, skill, null);
  }
}

function showTargetPrompt(char, skill, side) {
  const panel = document.getElementById('action-panel');
  panel.innerHTML = `
    <div class="action-panel-title">行动中：<span class="actor-name">${char.emoji} ${char.name}</span></div>
    <div class="target-prompt">🎯 选择目标：点击${side==='enemy'?'敌方':'友方'}角色</div>
    <div style="margin-top:10px"><button class="btn btn-secondary" onclick="cancelTarget()">取消</button></div>
  `;
}

function cancelTarget() {
  gameState.awaitingTarget = null;
  gameState.phase = 'player_turn';
  const entry = gameState.turnQueue[gameState.currentTurnIdx];
  const char = gameState.battle.teams[entry.teamIdx][entry.charIdx];
  renderBattleUI();
  renderActionPanel(char);
}

function onCharClick(teamIdx, charIdx) {
  if(!gameState.awaitingTarget) return;
  const clickedChar = gameState.battle.teams[teamIdx][charIdx];
  if(!clickedChar.alive) return;

  const { skill, actor } = gameState.awaitingTarget;
  const actorTeam = gameState.battle.getTeam(actor);
  const isActorTeam = actorTeam === gameState.battle.teams[teamIdx];

  if(gameState.phase === 'awaiting_target') {
    if(isActorTeam) return; // Must click enemy
    executePlayerSkill(actor, skill, [clickedChar]);
  } else if(gameState.phase === 'awaiting_ally_target') {
    if(!isActorTeam) return;
    executePlayerSkill(actor, skill, [clickedChar]);
  }
}

function executePlayerSkill(char, skill, targets) {
  gameState.awaitingTarget = null;

  char.stamina -= skill.cost;
  char.triggerValue = Math.min(char.triggerValue + skill.tv, TRIGGER_MAX);

  // Resolve targets
  let resolvedTargets = targets;
  if(!resolvedTargets) {
    if(skill.targetType === 'all_enemies') resolvedTargets = gameState.battle.getEnemies(char);
    else if(skill.targetType === 'all_allies') resolvedTargets = gameState.battle.getTeam(char).filter(a=>a.alive);
    else if(skill.targetType === 'self') resolvedTargets = [char];
  }

  skill.use(gameState.battle, char, resolvedTargets);

  // Check ultimate trigger
  finishCharTurn(char);
}

function playerUseUlt() {
  const entry = gameState.turnQueue[gameState.currentTurnIdx];
  const char = gameState.battle.teams[entry.teamIdx][entry.charIdx];
  const def = CHAR_DEFS[char.id];

  const freeUlt = char.buffs.find(b=>b.type==='free_ult');

  // Some ultimates need target (like lucas)
  if(char.id === 'lucas') {
    gameState.awaitingTarget = { isUlt: true, actor: char };
    gameState.phase = 'awaiting_ult_target';
    renderBattleUI();
    showTargetPrompt(char, def.ultimate, 'enemy');
    // Override onclick
    const panel = document.getElementById('action-panel');
    panel.innerHTML = `
      <div class="action-panel-title">行动中：<span class="actor-name">${char.emoji} ${char.name}</span></div>
      <div class="target-prompt">🎯 扫头：选择目标！</div>
      <div style="margin-top:10px"><button class="btn btn-secondary" onclick="cancelTarget()">取消</button></div>
    `;
    return;
  }

  if(freeUlt) char.buffs = char.buffs.filter(b=>b.type!=='free_ult');
  else char.triggerValue = 0;

  def.ultimate.use(gameState.battle, char);
  finishCharTurn(char);
}

function playerUseRecall() {
  const entry = gameState.turnQueue[gameState.currentTurnIdx];
  const char = gameState.battle.teams[entry.teamIdx][entry.charIdx];
  const def = CHAR_DEFS[char.id];
  if(char.recallUsed) return;
  char.recallUsed = true;
  def.recall.use(gameState.battle, char);
  // Recall doesn't end turn
  renderBattleUI();
  renderActionPanel(char);
}

function finishCharTurn(char) {
  gameState.phase = 'idle';
  if(gameState.battle.checkWin()) { endBattle(); return; }
  gameState.awaitingTarget = null;
  gameState.currentTurnIdx++;
  renderBattleUI();
  setTimeout(advanceTurn, 300);
}

// ====================================================
// AI TURN
// ====================================================
function aiTakeTurn(char) {
  const def = CHAR_DEFS[char.id];

  // Choose action: prefer biggest skill we can afford
  const usableSkills = def.skills.filter(sk => char.stamina >= sk.cost).sort((a,b)=>b.cost-a.cost);

  // Check if can ult
  if(char.triggerValue >= TRIGGER_MAX) {
    char.triggerValue = 0;
    def.ultimate.use(gameState.battle, char);
    if(gameState.battle.checkWin()) { endBattle(); return; }
    // Can still do a skill action
    gameState.battle.log(`${char.name} 触发值满，大招发动！`, 'ultimate');
  }

  if(usableSkills.length > 0) {
    const sk = usableSkills[0];
    char.stamina -= sk.cost;
    char.triggerValue = Math.min(char.triggerValue + sk.tv, TRIGGER_MAX);

    let targets;
    if(sk.targetType === 'single_enemy') {
      const enemies = gameState.battle.getEnemies(char).filter(e=>e.alive);
      // Target lowest HP enemy
      targets = enemies.length > 0 ? [enemies.reduce((a,b) => a.hp<b.hp?a:b)] : [];
    } else if(sk.targetType === 'all_enemies') {
      targets = gameState.battle.getEnemies(char).filter(e=>e.alive);
    } else if(sk.targetType === 'all_allies') {
      targets = gameState.battle.getTeam(char).filter(a=>a.alive);
    } else if(sk.targetType === 'self') {
      targets = [char];
    }

    if(targets && targets.length > 0) sk.use(gameState.battle, char, targets);
    else gameState.battle.log(`${char.name} 无法攻击（无目标）`, 'system');
  } else {
    // Use trigger to wait or try recall
    if(!char.recallUsed && Math.random() < 0.3) {
      char.recallUsed = true;
      def.recall.use(gameState.battle, char);
    } else {
      gameState.battle.log(`${char.name} 体力耗尽，蓄力等待...`, 'combat');
    }
  }

  if(gameState.battle.checkWin()) { endBattle(); return; }
  gameState.currentTurnIdx++;
  renderBattleUI();
  setTimeout(advanceTurn, 300);
}

// ====================================================
// RENDER BATTLE UI
// ====================================================
function renderBattleUI() {
  renderTeamBattle(0, 'team1-battle', false);
  renderTeamBattle(1, 'team2-battle', true);
  renderBattleLog();
}

function renderTeamBattle(teamIdx, containerId, isEnemy) {
  const container = document.getElementById(containerId);
  const team = gameState.battle.teams[teamIdx];
  const entry = gameState.currentTurnIdx < gameState.turnQueue.length
    ? gameState.turnQueue[gameState.currentTurnIdx] : null;

  container.innerHTML = '';
  team.forEach((char, charIdx) => {
    const isActor = entry && entry.teamIdx === teamIdx && entry.charIdx === charIdx;
    const isTarget = gameState.phase === 'awaiting_target' && isEnemy;
    const isAllyTarget = gameState.phase === 'awaiting_ally_target' && !isEnemy;
    const isUltTarget = gameState.phase === 'awaiting_ult_target' && isEnemy;

    const div = document.createElement('div');
    div.className = `battle-char
      ${char.alive?'':'dead'}
      ${isActor?'active-actor':''}
      ${(isTarget||isUltTarget)?'active-target':''}
      ${isAllyTarget?'ally-target':''}
    `.replace(/\s+/g,' ').trim();

    if((isTarget||isUltTarget) && char.alive) div.onclick = () => {
      if(gameState.phase === 'awaiting_ult_target') {
        // Lucas special
        const actor = gameState.awaitingTarget.actor;
        const def = CHAR_DEFS[actor.id];
        gameState.awaitingTarget = null;
        gameState.phase = 'idle';
        actor.triggerValue = 0;
        def.ultimate.use(gameState.battle, actor, [char]);
        finishCharTurn(actor);
      } else {
        onCharClick(teamIdx, charIdx);
      }
    };
    if(isAllyTarget && char.alive) div.onclick = () => onCharClick(teamIdx, charIdx);

    const hpPct = char.maxHp > 0 ? (char.hp / char.maxHp) * 100 : 0;
    const shieldPct = char.shield > 0 ? Math.min((char.shield / char.maxHp) * 100, 100) : 0;
    const hpClass = hpPct > 50 ? '' : hpPct > 25 ? 'warn' : 'crit';

    // Stamina dots
    let staminaDots = '';
    for(let i=0;i<char.maxStamina;i++) {
      staminaDots += `<div class="stamina-dot ${i<char.stamina?'filled':''}"></div>`;
    }

    // Status effects
    const buffList = char.buffs.filter(b=>b.type!=='offstage').map(b => {
      const names = { skill_up:'技能↑', saint_mode:'圣人', kidney_warrior:'肾斗士', crit_sure:'必暴', dodge_up:'闪避↑', omega_domain:'领域', usogui:'Usogui', ap_plus:'AP+', egg_power:'卤蛋↑', free_ult:'免费大招', abyss_guaranteed:'渊印保' };
      return `<span class="status-badge buff">${names[b.type]||b.type}${b.dur&&b.dur!==999?`(${b.dur})`:'∞'}</span>`;
    }).join('');

    const debuffList = char.debuffs.map(d => {
      const names = { stun:'眩晕', freeze:'冰冻', doubt:'Doubt', silence:'沉默', fear:'恐惧', dmg_down:'伤↓', taunted:'嘲讽', marked:'标记', bleed:'持伤', burn:'灼烧', tv_slow:'触↓', duel_mark:'决斗印', residual_echo:'残响态', offstage:'退场' };
      return `<span class="status-badge debuff">${names[d.type]||d.type}(${d.dur||1})</span>`;
    }).join('');

    const tvClass = char.triggerValue >= TRIGGER_MAX ? 'ready' : '';

    div.innerHTML = `
      <div class="char-row-top">
        <div class="char-emoji-sm">${char.alive?char.emoji:'💀'}</div>
        <div class="char-info-sm">
          <div class="name">${char.name.replace(/ (SSR|SR|SP|UR|God)$/,'')}</div>
          <div class="rarity rarity-${char.rarity}">${char.rarity}</div>
        </div>
        <div class="char-stats-right">
          <div class="stamina-dots">${staminaDots}</div>
          <div class="trigger-val ${tvClass}">⚡${char.triggerValue}</div>
        </div>
      </div>
      <div class="hp-bar-wrap">
        <div class="bar-labels">
          <span>HP ${char.hp}/${char.maxHp}</span>
          <span>${char.shield>0?`🛡${char.shield}`:''}</span>
        </div>
        <div class="bar-track"><div class="bar-fill hp-fill ${hpClass}" style="width:${Math.max(0,hpPct)}%"></div></div>
        ${char.shield>0?`<div class="bar-track" style="height:5px;margin-top:2px"><div class="bar-fill shield-fill" style="width:${shieldPct}%"></div></div>`:''}
      </div>
      ${buffList||debuffList ? `<div class="status-row">${buffList}${debuffList}</div>` : ''}
    `;

    container.appendChild(div);
  });
}

function renderBattleLog() {
  const log = document.getElementById('battle-log');
  log.innerHTML = '';
  const last50 = gameState.battle.logs.slice(-50);
  last50.forEach(entry => {
    const div = document.createElement('div');
    div.className = `log-entry ${entry.type}`;
    div.textContent = entry.text;
    log.appendChild(div);
  });
  log.scrollTop = log.scrollHeight;
}

// ====================================================
// END BATTLE
// ====================================================
function endBattle() {
  renderBattleUI();
  const resultScreen = document.getElementById('result-screen');
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');

  resultScreen.style.display = 'flex';

  if(gameState.battle.winner === 0) {
    title.textContent = '🏆 胜利！';
    title.className = 'result-title win';
    sub.textContent = '玩家队取得胜利！';
  } else if(gameState.battle.winner === 1) {
    title.textContent = '💀 败北...';
    title.className = 'result-title lose';
    sub.textContent = '敌方队获胜...再接再厉！';
  } else {
    title.textContent = '⚔️ 平局';
    title.className = 'result-title draw';
    sub.textContent = '势均力敌，再战一局！';
  }
}

// Init
showTitle();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMIS 4v4 决斗竞技场 · 全角色版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#05080f;--panel:#0d1320;--panel2:#111927;--border:#1e2d45;--accent:#00d4ff;--accent2:#ff2d6b;--accent3:#ffd700;--green:#00ff88;--purple:#c084fc;--text:#d4e8ff;--text2:#6b8aaa;--red:#ff3b3b;--gold:#ffd700}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(0,212,255,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(255,45,107,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
#title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:1;gap:30px;padding:40px}
.title-logo{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,6vw,4.5rem);font-weight:900;text-align:center;line-height:1.1}
.title-logo .main{color:var(--accent);text-shadow:0 0 30px rgba(0,212,255,.8)}
.title-logo .sub{color:var(--accent2);font-size:.4em;letter-spacing:.3em;text-shadow:0 0 20px rgba(255,45,107,.8)}
.title-logo .ver{color:var(--text2);font-size:.22em;letter-spacing:.5em;margin-top:8px}
.title-art{font-size:4rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.title-desc{text-align:center;color:var(--text2);max-width:560px;line-height:1.8;font-size:.9rem}
.char-count-badge{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:6px 20px;font-family:'Orbitron',sans-serif;font-size:.75rem;color:var(--accent);letter-spacing:.1em}
.btn{padding:12px 36px;border:none;border-radius:4px;font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.1em;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .4s}
.btn:hover::after{left:100%}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0088cc);color:#000;box-shadow:0 0 30px rgba(0,212,255,.4)}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(0,212,255,.7)}
.btn-secondary{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:linear-gradient(135deg,var(--accent2),#880022);color:#fff}
.btn-gold{background:linear-gradient(135deg,var(--gold),#cc8800);color:#000}
.btn-gold:hover{transform:scale(1.05)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
#select-screen{display:none;position:relative;z-index:1;padding:15px;max-width:1300px;margin:0 auto}
.select-header{text-align:center;padding:20px 0 15px;font-family:'Orbitron',sans-serif}
.select-header h1{font-size:1.6rem;color:var(--accent)}
.select-header p{color:var(--text2);margin-top:6px;font-size:.85rem}
.select-team-indicator{display:flex;align-items:center;justify-content:center;gap:20px;margin:15px 0;font-size:.9rem;font-weight:700}
.team-badge{padding:5px 18px;border-radius:4px;font-family:'Orbitron',sans-serif;font-size:.8rem}
.team-badge.team1{background:rgba(0,212,255,.15);border:1px solid var(--accent);color:var(--accent)}
.team-badge.team2{background:rgba(255,45,107,.15);border:1px solid var(--accent2);color:var(--accent2)}
.team-badge.active{transform:scale(1.1)}
.team-badge:not(.active){opacity:.4}
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:15px 0}
.char-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden}
.char-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 0 20px rgba(0,212,255,.3)}
.char-card.selected-1{border-color:var(--accent);background:rgba(0,212,255,.1)}
.char-card.selected-2{border-color:var(--accent2);background:rgba(255,45,107,.1)}
.char-card.disabled{opacity:.3;cursor:not-allowed}
.char-card-emoji{font-size:2.2rem;margin-bottom:6px}
.char-card-name{font-weight:700;font-size:.82rem;line-height:1.2}
.char-card-rarity{font-size:.65rem;letter-spacing:.15em;margin-top:3px;font-family:'Orbitron',sans-serif}
.rarity-SP{color:#c084fc}.rarity-SSR{color:var(--gold)}.rarity-SR{color:#94a3b8}.rarity-UR{color:#ff2d6b}.rarity-God{color:var(--gold);text-shadow:0 0 8px gold}.rarity-SSSSR{color:#ff8800;text-shadow:0 0 8px #ff8800}.rarity-AT{color:#00ff88}.rarity-SSSR{color:#f0abfc}
.selected-teams{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:15px 0}
.selected-team-panel{background:var(--panel);border-radius:8px;padding:14px;border:1px solid var(--border)}
.selected-team-panel h3{font-family:'Orbitron',sans-serif;font-size:.85rem;margin-bottom:10px}
.team1-panel h3{color:var(--accent)}.team2-panel h3{color:var(--accent2)}
.selected-slot{background:var(--panel2);border-radius:4px;padding:7px 10px;margin:5px 0;border:1px dashed var(--border);display:flex;align-items:center;gap:8px;min-height:40px;font-size:.85rem}
.selected-slot.filled{border-style:solid}
#battle-screen{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.battle-header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.battle-header-title{font-family:'Orbitron',sans-serif;font-size:.75rem;color:var(--text2);letter-spacing:.2em}
.round-display{font-family:'Orbitron',sans-serif;font-size:.95rem;color:var(--accent);font-weight:700}
.battle-main{flex:1;display:flex;flex-direction:column;padding:12px;gap:10px;max-width:1400px;margin:0 auto;width:100%}
.teams-area{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.team-panel{background:var(--panel);border-radius:8px;padding:10px;border:1px solid var(--border)}
.team-label{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.3em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.team-label.t1{color:var(--accent)}.team-label.t2{color:var(--accent2)}
.battle-char{background:var(--panel2);border-radius:6px;padding:9px;margin-bottom:7px;border:1px solid var(--border);transition:all .2s;position:relative}
.battle-char.active-actor{border-color:var(--accent3);box-shadow:0 0 12px rgba(255,215,0,.35)}
.battle-char.active-target{border-color:var(--accent2);box-shadow:0 0 12px rgba(255,45,107,.35);cursor:crosshair}
.battle-char.active-target:hover{background:rgba(255,45,107,.1)}
.battle-char.ally-target{border-color:var(--green);box-shadow:0 0 12px rgba(0,255,136,.3);cursor:pointer}
.battle-char.ally-target:hover{background:rgba(0,255,136,.08)}
.battle-char.dead{opacity:.2;filter:grayscale(1);pointer-events:none}
.char-row-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.char-emoji-sm{font-size:1.4rem}
.char-info-sm{flex:1;min-width:0}
.char-info-sm .name{font-weight:700;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-info-sm .rarity{font-size:.6rem;font-family:'Orbitron',sans-serif}
.char-stats-right{display:flex;align-items:center;gap:6px;font-size:.7rem}
.stamina-dots{display:flex;gap:2px}
.stamina-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.stamina-dot.filled{background:var(--accent3);box-shadow:0 0 4px rgba(255,215,0,.6)}
.trigger-val{font-family:'Orbitron',sans-serif;font-size:.7rem;color:var(--purple);min-width:28px;text-align:right}
.trigger-val.ready{color:var(--accent3);text-shadow:0 0 8px rgba(255,215,0,.8);animation:glow 1s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.6}}
.hp-bar-wrap{margin-bottom:3px}
.bar-labels{display:flex;justify-content:space-between;font-size:.62rem;color:var(--text2);margin-bottom:2px}
.bar-track{height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.hp-fill{background:linear-gradient(90deg,#00ff88,#00cc44)}
.hp-fill.warn{background:linear-gradient(90deg,#ff8800,#cc5500)}
.hp-fill.crit{background:linear-gradient(90deg,#ff3b3b,#990000)}
.shield-fill{background:linear-gradient(90deg,#60a5fa,#2563eb)}
.status-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.status-badge{font-size:.58rem;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.04em}
.status-badge.buff{background:rgba(0,255,136,.2);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.status-badge.debuff{background:rgba(255,59,59,.2);color:var(--red);border:1px solid rgba(255,59,59,.3)}
.status-badge.special{background:rgba(192,132,252,.2);color:var(--purple);border:1px solid rgba(192,132,252,.3)}
.log-area{background:var(--panel);border-radius:8px;border:1px solid var(--border);padding:10px;height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.log-entry{font-size:.75rem;line-height:1.5;padding:1px 0;color:var(--text2);animation:logIn .3s ease}
@keyframes logIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1}}
.log-entry.combat{color:#ffa0a0}.log-entry.skill{color:#a0d4ff}.log-entry.ultimate{color:var(--gold);font-weight:700}.log-entry.heal{color:var(--green)}.log-entry.system{color:var(--accent);font-weight:700}.log-entry.death{color:#ff3b3b;font-weight:700}.log-entry.round{color:var(--text2);text-align:center;padding:5px 0;border-top:1px solid var(--border)}
.action-panel{background:var(--panel);border-radius:8px;border:1px solid var(--border);padding:14px}
.action-panel-title{font-family:'Orbitron',sans-serif;font-size:.75rem;color:var(--text2);letter-spacing:.15em;margin-bottom:10px}
.action-panel-title .actor-name{color:var(--accent3);font-weight:700}
.skills-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin-bottom:8px}
.skill-btn{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:9px 11px;cursor:pointer;transition:all .2s;text-align:left;color:var(--text);position:relative;overflow:hidden}
.skill-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(0,212,255,.08);transform:translateY(-2px)}
.skill-btn:disabled{opacity:.32;cursor:not-allowed}
.skill-btn.ult-btn{border-color:var(--gold);background:rgba(255,215,0,.06)}
.skill-btn.ult-btn:hover:not(:disabled){background:rgba(255,215,0,.14);box-shadow:0 0 14px rgba(255,215,0,.3)}
.skill-btn.recall-btn{border-color:var(--purple)}
.skill-btn.recall-btn:hover:not(:disabled){background:rgba(192,132,252,.1)}
.skill-name{font-weight:700;font-size:.82rem;margin-bottom:2px}
.skill-desc{font-size:.65rem;color:var(--text2);line-height:1.35}
.skill-cost{position:absolute;top:7px;right:7px;font-size:.62rem;font-family:'Orbitron',sans-serif;text-align:right}
.skill-cost .cost-sp{color:var(--accent3)}.skill-cost .cost-tv{color:var(--purple);font-size:.58rem}
.target-prompt{background:rgba(255,45,107,.1);border:1px solid rgba(255,45,107,.3);border-radius:6px;padding:10px;text-align:center;color:var(--accent2);font-size:.88rem;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
#result-screen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,8,15,.95);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.result-title{font-family:'Orbitron',sans-serif;font-size:clamp(2.5rem,8vw,6rem);font-weight:900;text-align:center}
.result-title.win{color:var(--accent);text-shadow:0 0 40px rgba(0,212,255,.8)}
.result-title.lose{color:var(--accent2);text-shadow:0 0 40px rgba(255,45,107,.8)}
.result-title.draw{color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,.8)}
@media(max-width:768px){.teams-area,.selected-teams{grid-template-columns:1fr}.skills-row{grid-template-columns:1fr 1fr}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--panel)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
</style>
</head>
<body>

<!-- TITLE -->
<div id="title-screen">
  <div class="title-art">⚔️</div>
  <div class="title-logo">
    <div class="main">CMIS 4v4 ARENA</div>
    <div class="sub">天王决斗竞技场 · 全角色版</div>
    <div class="ver">ALL CHARACTERS UNLOCKED</div>
  </div>
  <div class="char-count-badge">🎮 25 CHARACTERS · 5 RARITY TIERS</div>
  <div class="title-desc">组建你的4人战队，与对手展开激烈的战略对决。<br>触发值满10释放大招！每场回想只可使用1次！</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-primary" onclick="showSelectScreen()">▶ 开始游戏</button>
    <button class="btn btn-secondary" onclick="showRules()">📋 规则说明</button>
  </div>
</div>

<!-- SELECT -->
<div id="select-screen">
  <div class="select-header">
    <h1>⚔ 选择你的队伍</h1>
    <p>每队选4名角色 · 点击角色选择 · 点击队伍槽位移除</p>
  </div>
  <div class="select-team-indicator">
    <div class="team-badge team1 active" id="badge-t1">▶ 玩家队 (0/4)</div>
    <div style="color:var(--text2)">VS</div>
    <div class="team-badge team2" id="badge-t2">对手队 (0/4)</div>
  </div>
  <div class="roster-grid" id="roster-grid"></div>
  <div class="selected-teams">
    <div class="selected-team-panel team1-panel"><h3>🔵 玩家队伍</h3><div id="team1-slots"></div></div>
    <div class="selected-team-panel team2-panel"><h3>🔴 对手队伍</h3><div id="team2-slots"></div></div>
  </div>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0;padding-bottom:20px">
    <button class="btn btn-gold" onclick="autoPickEnemy()">🤖 AI随机敌队</button>
    <button class="btn btn-primary" id="btn-start-battle" onclick="startBattle()" disabled>⚔ 开始战斗</button>
    <button class="btn btn-secondary" onclick="showTitle()">← 返回</button>
  </div>
</div>

<!-- BATTLE -->
<div id="battle-screen" style="display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1">
  <div class="battle-header">
    <div class="battle-header-title">4v4 ARENA · COMBAT</div>
    <div class="round-display" id="round-display">第 1 回合</div>
    <div style="font-size:.8rem;color:var(--text2)" id="turn-display">准备中...</div>
  </div>
  <div class="battle-main">
    <div class="teams-area">
      <div class="team-panel"><div class="team-label t2">🔴 ENEMY TEAM</div><div id="team2-battle"></div></div>
      <div class="team-panel"><div class="team-label t1">🔵 PLAYER TEAM</div><div id="team1-battle"></div></div>
    </div>
    <div class="log-area" id="battle-log"></div>
    <div class="action-panel" id="action-panel">
      <div class="action-panel-title">等待战斗开始...</div>
      <div id="action-content"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-title" id="result-title">胜利!</div>
  <div style="color:var(--text2);font-size:1rem;text-align:center" id="result-sub"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-primary" onclick="showSelectScreen()">再战一局</button>
    <button class="btn btn-secondary" onclick="showTitle()">返回主菜单</button>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const BASE_HP=1000,BASE_DMG=100,SHIELD_BLOCK=0.5,HEADSHOT_CHANCE=.10,DODGE_CHANCE=.15,HEADSHOT_MULT=1.5,TRIGGER_MAX=10,STAMINA_MAX=8,STAMINA_INIT=5;

// ============================================================
// ALL CHARACTER DEFINITIONS
// ============================================================
const CHAR_DEFS = {

// ───────── 生殖隔离区 ─────────
mitsuki:{
  id:'mitsuki',name:'密切二 SP',rarity:'SP',role:'辅助控制',emoji:'📚',color:'#c084fc',
  hp:1000,atk:100,initStamina:5,maxStamina:8,initShield:0,
  initStats:{perfection:0},
  passiveInfo:'每2回合+5%攻防；被攻击时50%减伤（1回合）',
  applyPassive(c,B){if(B.round%2===0){c._passiveAtk=(B.round/2)*5;}},
  skills:[
    {id:'s1',name:'Cognitive Dominion',cost:2,tv:2,targetType:'single_enemy',
     desc:'单体100%法伤，目标伤害-40%（2回）',
     use(B,me,T){const t=T[0];const d=B.dealDmg(me,t,1.0,'magic');B.addDebuff(t,'dmg_down',{val:.4,dur:2});B.log(`${me.name}「Cognitive Dominion」→${t.name}: ${d}法伤，伤害-40%（2回）`,'skill')}},
    {id:'s2',name:'Im literally yuichi',cost:2,tv:3,targetType:'single_enemy',
     desc:'Doubt（2回）：50%概率行动失败',
     use(B,me,T){const t=T[0];B.addDebuff(t,'doubt',{dur:2});B.log(`${me.name}「Im literally yuichi」→${t.name}陷入Doubt（2回）`,'skill')}},
    {id:'s3',name:'Based-Pilled',cost:2,tv:4,targetType:'all_allies',
     desc:'全队技能伤+50%（1回），+1 Perfection',
     use(B,me,T){T.forEach(t=>{if(t.alive)B.addBuff(t,'skill_up',{val:.5,dur:1})});me.stats.perfection=(me.stats.perfection||0)+1;B.log(`${me.name}「Based-Pilled」全队技能+50%（1回），P→${me.stats.perfection}`,'skill')}}
  ],
  ultimate:{name:'Checkmate',tv:10,targetType:'all_enemies',
    desc:'沉默最高HP敌，全体(105%+P×15%)法伤，触发值-2',
    use(B,me,T){const hi=T.reduce((a,b)=>a.hp>b.hp?a:b);B.addDebuff(hi,'silence',{dur:2});const p=me.stats.perfection||0;const mult=1.05+.15*p;B.log(`✨ ${me.name}「CHECKMATE」！${hi.name}沉默2回`,'ultimate');T.forEach(e=>{const d=B.dealDmg(me,e,mult,'magic');e.triggerValue=Math.max(0,e.triggerValue-2);B.log(`  →${e.name}: ${d}法伤，触发-2`,'combat')});me.stats.perfection=0;}},
  recall:{name:"Usogui's Gambit",desc:'激活强化被动，攻防+5%（1回）',
    use(B,me){B.addBuff(me,'usogui',{val:.05,dur:1});B.log(`🃏 ${me.name}「Usogui's Gambit」！被动强化激活`,'skill')}}
},

addy:{
  id:'addy',name:'阿爹·欧尼chan AT',rarity:'AT',role:'版本外独立',emoji:'👁️',color:'#00ff88',
  hp:100,atk:100,initStamina:5,maxStamina:8,initShield:0,
  initStats:{},
  passiveInfo:'无下限：体术法术无效，只受领域伤害；脆皮：最大HP=100，无法获得护盾；女角色死亡则自爆',
  applyPassive(c,B){c.maxHp=100;c.shield=0;/* immune to non-domain in dealDmg */},
  skills:[
    {id:'s1',name:'监控证据',cost:1,tv:1,targetType:'single_enemy',
     desc:'使敌方1人离场1回合，体力-1，触发值-1',
     use(B,me,T){const t=T[0];B.addDebuff(t,'offstage',{dur:1});t.stamina=Math.max(0,t.stamina-1);t.triggerValue=Math.max(0,t.triggerValue-1);B.log(`${me.name}「监控证据」：${t.name}离场1回合，体力-1，触发-1`,'skill')}},
    {id:'s2',name:'AURA',cost:1,tv:2,targetType:'self',

// ============================================================
// BATTLE ENGINE
// ============================================================
class Battle{
  constructor(t1,t2){this.teams=[t1,t2];this.round=0;this.logs=[];this.isOver=false;this.winner=null;}
  log(txt,type='combat'){this.logs.push({txt,type});if(this.logs.length>250)this.logs.shift();}
  getTeam(c){return this.teams.find(t=>t.some(x=>x._uid===c._uid));}
  getEnemies(c){return this.teams.find(t=>!t.some(x=>x._uid===c._uid)).filter(e=>e.alive);}

  dealDmg(attacker,defender,mult,type,fixedDmg=null){
    if(!defender||!defender.alive)return 0;
    // Addy passive: immune to physical/magic, only domain
    if(defender.id==='addy'&&type!=='domain'&&type!=='true')return 0;

    let finalMult=mult;
    if(type!=='true'&&fixedDmg===null){
      const dodgeChance=DODGE_CHANCE+(defender.buffs.find(b=>b.type==='dodge_up')?.val||0)+(defender.buffs.find(b=>b.type==='quantum_state')?.val||0);
      // Quantum consciousness hop (Kazuo)
      const quantumDodge=defender.id==='kazuo'?.35:0;
      if(Math.random()<dodgeChance+quantumDodge){this.log(`  ${defender.name} 闪避！`,'combat');return 0;}
      const hsChance=HEADSHOT_CHANCE*(attacker._doubleHeadshot?2:1)+(attacker._forceHeadshot?.99:0);
      if(Math.random()<hsChance)finalMult*=HEADSHOT_MULT;
    }

    let atkBase=attacker.atk;
    let atkMult=1+(attacker._passiveAtk||0)/100;
    if(attacker._passiveAtkMult&&attacker._passiveAtkMult>1)atkMult*=attacker._passiveAtkMult;
    if(attacker._rageBonus)atkMult+=attacker._rageBonus;
    atkMult+=attacker.buffs.filter(b=>b.type==='skill_up').reduce((s,b)=>s+b.val,0);
    if(attacker.buffs.find(b=>b.type==='saint_mode'))atkMult+=attacker.buffs.find(b=>b.type==='saint_mode').val;
    if(attacker.buffs.find(b=>b.type==='kidney_warrior'))atkMult+=attacker.buffs.find(b=>b.type==='kidney_warrior').val;
    if(attacker.buffs.find(b=>b.type==='egg_power'))atkMult+=attacker.buffs.find(b=>b.type==='egg_power').val;
    if(attacker.buffs.find(b=>b.type==='aura'))atkMult+=attacker.buffs.find(b=>b.type==='aura').val;
    if(attacker.buffs.find(b=>b.type==='consul'))atkMult+=attacker.buffs.find(b=>b.type==='consul').val;
    if(attacker.buffs.find(b=>b.type==='area_boost'))atkMult+=attacker.buffs.find(b=>b.type==='area_boost').val;
    // Duel prints, resonance, recursive
    atkMult+=(attacker.stats?.duelPrints||0)*.03;
    atkMult+=(attacker.stats?.resonanceStacks||0)*.10;
    if(attacker.stats?.recursiveBonus>1)atkMult*=attacker.stats.recursiveBonus;
    // destruction marks
    const dMarks=attacker.stats?.destructionMarks||0;
    atkMult+=dMarks*.03;
    // Crit sure
    if(attacker.buffs.find(b=>b.type==='crit_sure')&&type!=='true')finalMult*=1.5;
    // Absolute foresight (tetsuya)
    if(attacker.buffs.find(b=>b.type==='absolute_foresight'))finalMult*=1.5;
    // Star glory (mika)
    atkMult+=(attacker.stats?.starGlory||0)*.05;
    // Piercing crit (madame recall)
    if(attacker.buffs.find(b=>b.type==='piercing_crit')){finalMult*=2.0;defender.shield=0;}
    // AP+ (lua)
    const apPlus=attacker.buffs.find(b=>b.type==='ap_plus');
    if(apPlus&&apPlus.count>0&&type!=='true'){finalMult+=apPlus.val;apPlus.count--;if(apPlus.count<=0)attacker.buffs=attacker.buffs.filter(b=>b.type!=='ap_plus');}

    let rawDmg;
    if(fixedDmg!==null)rawDmg=fixedDmg;
    else if(type==='true'||type==='domain')rawDmg=Math.floor(defender.maxHp*finalMult);
    else rawDmg=Math.floor(atkBase*finalMult*atkMult);

    // Marked
    const mk=defender.debuffs.find(d=>d.type==='marked');
    if(mk)rawDmg=Math.floor(rawDmg*(1+mk.val));
    // Guillotine marks (madame)
    if(attacker.stats?.guillotineMarks&&attacker.stats.guillotineMarks[defender._uid]>0&&type!=='true'){const gm=attacker.stats.guillotineMarks[defender._uid];const extra=Math.floor(defender.maxHp*.15*gm);this.applyHpDmg(defender,extra);attacker.stats.guillotineMarks[defender._uid]=0;}
    // dmg_down
    const ddwn=defender.debuffs.filter(d=>d.type==='dmg_down').reduce((s,d)=>s+d.val,0);
    rawDmg=Math.floor(rawDmg*(1-Math.min(ddwn,.85)));
    // Passive def mult
    if(defender._passiveDefMult&&defender._passiveDefMult<1)rawDmg=Math.floor(rawDmg*defender._passiveDefMult);
    // True resist
    if(type==='true'&&defender.buffs.find(b=>b.type==='true_resist'))rawDmg=Math.floor(rawDmg*(1-defender.buffs.find(b=>b.type==='true_resist').val));
    // Cursed rng
    const cr=defender.debuffs.find(d=>d.type==='cursed_rng');
    if(cr)rawDmg=Math.floor(rawDmg*(1+cr.val));
    // Reflect
    const ref=defender.buffs.find(b=>b.type==='dmg_reduce_reflect');
    if(ref){const refAmt=Math.floor(rawDmg*ref.val);rawDmg=Math.floor(rawDmg*(1-ref.val));if(refAmt>0)this.applyHpDmg(attacker,refAmt);}
    // Duel mark reflect
    const dm=defender.debuffs.find(d=>d.type==='duel_mark');
    if(dm&&type!=='true')this.applyHpDmg(attacker,Math.floor(rawDmg*dm.val));
    // Paradox (tetsuya)
    const par=defender.debuffs.find(d=>d.type==='paradox');
    if(par&&type!=='true')this.applyHpDmg(attacker,Math.floor(rawDmg*par.val));
    // Star mark bonus
    if(attacker.stats?.starMarks&&attacker.stats.starMarks[defender._uid])rawDmg=Math.floor(rawDmg*(1+attacker.stats.starMarks[defender._uid]*.06));

    if(type==='true'){this.applyHpDmg(defender,rawDmg);}
    else if(defender.shield>0){const absorb=Math.floor(rawDmg*SHIELD_BLOCK);this.applyHpDmg(defender,rawDmg-absorb);const actualAbsorb=Math.min(defender.shield,absorb);defender.shield-=actualAbsorb;}
    else{this.applyHpDmg(defender,rawDmg);}
    return rawDmg;
  }

  applyHpDmg(c,dmg){
    if(dmg<=0||!c)return;
    if(!c.alive)return;
    // Undying (seia)
    if(c.buffs.find(b=>b.type==='undying')&&c.hp-dmg<=0){c.buffs=c.buffs.filter(b=>b.type!=='undying');c.hp=1;this.log(`  🌹 ${c.name}免死触发！`,'system');return;}
    // Scriptwriter bad ending: death = draw
    if(c.id==='scriptwriter'){this.isOver=true;this.winner=-1;this.log(`📜 Scriptwriter阵亡！Bad Ending——平局！`,'system');c.hp=0;c.alive=false;return;}
    // Omega: residual echo
    if(c.id==='omega'&&!c._echoActive&&c.alive&&c.hp-dmg<=0){c._echoActive=true;c._echoDur=2;c.hp=1;this.log(`🎵 ${c.name}进入残响态！2回合后复活！`,'system');return;}
    // Xeno: residual core
    if(c.id==='xeno'&&!c._xenoEcho&&c.alive&&c.hp-dmg<=0){c._xenoEcho=true;c._xenoDur=3;c.hp=1;c.shield+=Math.floor(c.maxHp*.3);this.log(`👾 ${c.name}进入残核态！护盾+30%`,'system');return;}
    c.hp=Math.max(0,c.hp-dmg);
    if(c.hp<=0){c.hp=0;c.alive=false;this.log(`☠ ${c.name} 阵亡！`,'death');}
  }

  healChar(c,amt){
    if(!c||!c.alive)return 0;
    const over=(c.hp+amt)-c.maxHp;
    if(over>0){c.hp=c.maxHp;c.shield+=over;}
    else c.hp=Math.min(c.hp+amt,c.maxHp);
    return amt;
  }

  addBuff(c,type,opts){if(c&&c.alive)c.buffs.push({type,...opts});}
  addDebuff(c,type,opts){
    if(!c||!c.alive)return;
    // Omega absorbs debuffs as resonance
    if(c.id==='omega'){c.stats.resonanceStacks=(c.stats.resonanceStacks||0)+2;this.log(`  🎵Ω吸收控制→共鸣印+2（${c.stats.resonanceStacks}层）`,'system');return;}
    // Immune to control (tetsuya, madame consul)
    if((c.id==='tetsuya'||c.buffs.find(b=>b.type==='immune_control'))&&['stun','freeze','silence','fear'].includes(type))return;
    c.debuffs.push({type,...opts});
  }

  tickStatusEffects(c){
    if(!c.alive)return;
    // DoT effects
    c.debuffs.filter(d=>d.type==='burn'||d.type==='bleed'||d.type==='spore').forEach(d=>{if(d.src&&d.src.alive){const dmg=this.dealDmg(d.src,c,d.val,'magic');if(dmg>0)this.log(`  🔥${c.name}持续伤害: ${dmg}`,'combat')}});
    // Atom mark DoT
    c.debuffs.filter(d=>d.type==='atom_mark').forEach(d=>{if(d.src&&d.src.alive){const td=Math.floor(c.maxHp*d.val);this.dealDmg(d.src,c,0,'true',td);}});
    // Atom invasion DoT
    c.debuffs.filter(d=>d.type==='atom_invasion').forEach(d=>{if(d.src&&d.src.alive){const td=Math.floor(c.maxHp*d.val);this.applyHpDmg(c,td);}});
    // Revolution wave
    c.debuffs.filter(d=>d.type==='revolution').forEach(d=>{if(Math.random()<.7){c._skipTurn=true;const td=Math.floor(c.maxHp*.2);this.applyHpDmg(c,td);this.log(`  🇫🇷 ${c.name}在革命浪潮中跳过行动并受真伤！`,'combat')}});
    // TV slow
    c.debuffs.filter(d=>d.type==='tv_slow').forEach(()=>{/* handled in trigger gain */});
    // Time trap: TV-1
    c.debuffs.filter(d=>d.type==='time_trap').forEach(()=>{c.triggerValue=Math.max(0,c.triggerValue-.5);});
    // Tick echo
    if(c._echoActive){c._echoDur--;if(c._echoDur<=0){c._echoActive=false;c.hp=c.maxHp;c.debuffs=c.debuffs.filter(d=>d.type!=='residual_echo');this.log(`🎵 ${c.name}从残响态复活！`,'heal');}}
    if(c._xenoEcho){c._xenoDur--;if(c._xenoDur<=0){c._xenoEcho=false;c.hp=Math.floor(c.maxHp*.5);this.log(`👾 ${c.name}从残核态复活！`,'heal');}}
    // Floating cannons (mika)
    if(c.stats?.floatingCannons>0){const es=this.getEnemies(c).filter(e=>e.alive);for(let i=0;i<c.stats.floatingCannons;i++){if(es.length){const t=es[Math.floor(Math.random()*es.length)];const d=this.dealDmg(c,t,.6,'magic');if(d>0)this.log(`  ⭐浮游炮→${t.name}: ${d}`,'combat');}}}
    // Decay durations
    c.buffs.forEach(b=>{if(b.dur&&b.dur!==999)b.dur--;});
    c.debuffs.forEach(d=>{if(d.dur)d.dur--;});
    c.buffs=c.buffs.filter(b=>b.dur===undefined||b.dur===999||b.dur>0);
    c.debuffs=c.debuffs.filter(d=>d.dur===undefined||d.dur>0);
    // Recover stamina
    c.stamina=Math.min(c.stamina+1,c.maxStamina);
  }

  checkWin(){
    if(this.isOver)return true;
    const t0=this.teams[0].some(c=>c.alive);
    const t1=this.teams[1].some(c=>c.alive);
    if(!t0&&!t1){this.isOver=true;this.winner=-1;return true;}
    if(!t0){this.isOver=true;this.winner=1;return true;}
    if(!t1){this.isOver=true;this.winner=0;return true;}
    return false;
  }
}

// ============================================================
// GAME STATE
// ============================================================
let GS={screen:'title',sel1:[],sel2:[],selTeam:1,battle:null,turnQueue:[],turnIdx:0,awaiting:null,phase:'idle'};
let _uid=0;

function makeChar(def){
  return{...def,_uid:++_uid,hp:def.hp,maxHp:def.hp,shield:def.initShield||0,
    stamina:def.initStamina,maxStamina:def.maxStamina,triggerValue:0,alive:true,
    buffs:[],debuffs:[],stats:{...(def.initStats||{})},recallUsed:false,
    _passiveAtkMult:1,_passiveDefMult:1,_passiveAtk:0,_rageBonus:0,
    _echoActive:false,_echoDur:0,_xenoEcho:false,_xenoDur:0,_skipTurn:false};
}

function buildQueue(teams){const q=[];for(let i=0;i<4;i++){q.push({ti:0,ci:i});q.push({ti:1,ci:i});}return q;}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showTitle(){document.getElementById('title-screen').style.display='flex';document.getElementById('select-screen').style.display='none';document.getElementById('battle-screen').style.display='none';document.getElementById('result-screen').style.display='none';}
function showSelectScreen(){GS.sel1=[];GS.sel2=[];GS.selTeam=1;document.getElementById('title-screen').style.display='none';document.getElementById('select-screen').style.display='block';document.getElementById('battle-screen').style.display='none';document.getElementById('result-screen').style.display='none';renderSelect();}
function showRules(){alert('【4v4 决斗竞技场 规则】\n\n🩸基础：生命1000，基础伤害100，初始体力5/8，每回合+1体力\n\n⚔攻击：15%闪避，10%爆头(×150%)，50/50上半身/腿部\n\n🛡护盾：阻挡50%伤害，HP超上限自动转护盾\n\n💫技能：技能1→+2触发，技能2→+3，技能3→+4；大招触发值归零；回想每局限1次\n\n☠真实伤害：直接扣HP，无视护盾\n\n🎮AI每回合自动选最高消耗可用技能');}

function renderSelect(){
  const g=document.getElementById('roster-grid');
  g.innerHTML='';
  CHAR_LIST.forEach(def=>{
    const in1=GS.sel1.includes(def.id),in2=GS.sel2.includes(def.id);
    const dis=in1||in2;
    const d=document.createElement('div');
    d.className=`char-card ${in1?'selected-1':''} ${in2?'selected-2':''} ${dis&&!in1&&!in2?'disabled':''}`;
    d.innerHTML=`<div class="char-card-emoji">${def.emoji}</div><div class="char-card-name">${def.name.replace(/ (SSSSR\+?|SSSR|SSR|SR|SP|UR|God|AT)$/,'')}</div><div class="char-card-rarity rarity-${def.rarity}">${def.rarity}·${def.role}</div>`;
    if(!dis)d.onclick=()=>selectChar(def.id);
    g.appendChild(d);
  });
  renderSlots('team1-slots',GS.sel1,'t1');
  renderSlots('team2-slots',GS.sel2,'t2');
  document.getElementById('badge-t1').textContent=`${GS.selTeam===1?'▶ ':''}玩家队 (${GS.sel1.length}/4)`;
  document.getElementById('badge-t2').textContent=`${GS.selTeam===2?'▶ ':''}对手队 (${GS.sel2.length}/4)`;
  document.getElementById('badge-t1').className=`team-badge team1 ${GS.selTeam===1?'active':''}`;
  document.getElementById('badge-t2').className=`team-badge team2 ${GS.selTeam===2?'active':''}`;
  document.getElementById('btn-start-battle').disabled=!(GS.sel1.length===4&&GS.sel2.length===4);
}

function renderSlots(id,team,tc){
  const el=document.getElementById(id);el.innerHTML='';
  for(let i=0;i<4;i++){
    const def=team[i]?CHAR_DEFS[team[i]]:null;
    const s=document.createElement('div');
    s.className=`selected-slot ${def?'filled':''}`;
    if(def){s.innerHTML=`<span>${def.emoji}</span><div><div style="font-weight:700;font-size:.82rem">${def.name.replace(/ (SSSSR\+?|SSSR|SSR|SR|SP|UR|God|AT)$/,'')}</div><div class="char-card-rarity rarity-${def.rarity}" style="font-size:.62rem">${def.rarity}</div></div>`;s.onclick=()=>{team.splice(team.indexOf(def.id),1);if(tc==='t1')GS.selTeam=1;renderSelect();};s.style.cursor='pointer';s.title='点击移除';}
    else s.innerHTML=`<span style="color:var(--text2);font-size:.78rem">空位${i+1}</span>`;
    el.appendChild(s);
  }
}

function selectChar(id){
  if(GS.selTeam===1){if(GS.sel1.length<4&&!GS.sel1.includes(id)){GS.sel1.push(id);if(GS.sel1.length===4)GS.selTeam=2;}}
  else{if(GS.sel2.length<4&&!GS.sel2.includes(id))GS.sel2.push(id);}
  renderSelect();
}

function autoPickEnemy(){
  const avail=CHAR_LIST.map(d=>d.id).filter(id=>!GS.sel1.includes(id));
  GS.sel2=[];
  while(GS.sel2.length<4&&avail.length){const i=Math.floor(Math.random()*avail.length);GS.sel2.push(avail.splice(i,1)[0]);}
  renderSelect();
}

// ============================================================
// BATTLE START
// ============================================================
function startBattle(){
  const t1=GS.sel1.map(id=>makeChar(CHAR_DEFS[id]));
  const t2=GS.sel2.map(id=>makeChar(CHAR_DEFS[id]));
  GS.battle=new Battle(t1,t2);
  GS.turnQueue=buildQueue([t1,t2]);
  GS.turnIdx=0;GS.awaiting=null;GS.phase='idle';
  document.getElementById('select-screen').style.display='none';
  document.getElementById('battle-screen').style.display='flex';
  GS.battle.log('⚔️ 战斗开始！','system');
  startRound();
}

function startRound(){
  GS.battle.round++;
  GS.battle.log(`━━━ 第 ${GS.battle.round} 回合 ━━━`,'round');
  document.getElementById('round-display').textContent=`第 ${GS.battle.round} 回合`;
  GS.battle.teams.forEach(team=>team.forEach(c=>{
    if(c.alive){
      c._skipTurn=false;
      const def=CHAR_DEFS[c.id];
      if(def.applyPassive)def.applyPassive(c,GS.battle);
      GS.battle.tickStatusEffects(c);
    }
  }));
  GS.turnIdx=0;
  advanceTurn();
}

function advanceTurn(){
  if(GS.battle.checkWin()){endBattle();return;}
  while(GS.turnIdx<GS.turnQueue.length){
    const e=GS.turnQueue[GS.turnIdx];
    const c=GS.battle.teams[e.ti][e.ci];
    if(c&&c.alive)break;
    GS.turnIdx++;
  }
  if(GS.turnIdx>=GS.turnQueue.length){renderBattleUI();setTimeout(startRound,400);return;}
  const e=GS.turnQueue[GS.turnIdx];
  const c=GS.battle.teams[e.ti][e.ci];
  document.getElementById('turn-display').textContent=`${c.name} 的回合`;
  // Status checks
  const stun=c.debuffs.find(d=>['stun','freeze','fear','offstage'].includes(d.type));
  if(stun||c._skipTurn){
    if(!c._skipTurn)GS.battle.log(`⚡ ${c.name}被控制，跳过行动`,'combat');
    c._skipTurn=false;GS.turnIdx++;renderBattleUI();setTimeout(advanceTurn,400);return;
  }
  // Doubt check
  const doubt=c.debuffs.find(d=>d.type==='doubt');
  if(doubt&&Math.random()<.5){GS.battle.log(`❓ ${c.name}Doubt失误，行动取消！`,'combat');GS.turnIdx++;renderBattleUI();setTimeout(advanceTurn,400);return;}
  // Discord check
  if(c.debuffs.find(d=>d.type==='discord')&&Math.random()<.6){GS.battle.log(`🎸 ${c.name}混乱！行动失败！`,'combat');GS.turnIdx++;renderBattleUI();setTimeout(advanceTurn,400);return;}
  // Time seal (nagisa ult)
  if(c.debuffs.find(d=>d.type==='time_seal')&&Math.random()<.5){GS.battle.log(`⏳ ${c.name}时间封印！行动失败！`,'combat');GS.turnIdx++;renderBattleUI();setTimeout(advanceTurn,400);return;}
  if(e.ti===0){GS.phase='player_turn';renderBattleUI();renderActionPanel(c);}
  else{GS.phase='ai_turn';renderBattleUI();setTimeout(()=>aiTurn(c),700);}
}

// ============================================================
// PLAYER ACTIONS
// ============================================================
function renderActionPanel(c){
  const panel=document.getElementById('action-panel');
  const def=CHAR_DEFS[c.id];
  const silenced=c.debuffs.find(d=>d.type==='silence');
  const hdr=`<div class="action-panel-title">行动中：<span class="actor-name">${c.emoji} ${c.name}</span> | 体力 ${c.stamina}/${c.maxStamina} | 触发 ${c.triggerValue}/10 | 护盾 ${c.shield}</div>`;
  let html='<div class="skills-row">';
  def.skills.forEach((sk,i)=>{
    // Season tax (pay2win enemy)
    const tax=c.debuffs.find(d=>d.type==='season_tax');
    const extra=tax?tax.val:0;
    const expensive=c.debuffs.find(d=>d.type==='expensive');
    const xtra=expensive?expensive.val:0;
    const realCost=sk.cost+extra+xtra;
    const canUse=!silenced&&c.stamina>=realCost;
    const noUlt=c.debuffs.find(d=>d.type==='no_ult');
    html+=`<button class="skill-btn" ${canUse?'':'disabled'} onclick="playerSkill(${i})"><div class="skill-cost"><span class="cost-sp">💪${realCost}</span> <span class="cost-tv">+${sk.tv}⚡</span></div><div class="skill-name">${sk.name}</div><div class="skill-desc">${sk.desc}</div></button>`;
  });
  // Ultimate
  const freeUlt=c.buffs.find(b=>b.type==='free_ult');
  const noUlt=c.debuffs.find(d=>d.type==='no_ult');
  const reqTV=def.ultimate.tv||TRIGGER_MAX;
  const canUlt=(c.triggerValue>=reqTV||freeUlt)&&!noUlt;
  html+=`<button class="skill-btn ult-btn" ${canUlt?'':'disabled'} onclick="playerUlt()"><div class="skill-cost"><span style="color:var(--gold)">★${reqTV}⚡</span></div><div class="skill-name">${def.ultimate.name}</div><div class="skill-desc">${def.ultimate.desc}</div></button>`;
  // Recall
  const canRecall=!c.recallUsed&&!c.debuffs.find(d=>d.type==='recall_blocked');
  html+=`<button class="skill-btn recall-btn" ${canRecall?'':'disabled'} onclick="playerRecall()"><div class="skill-cost"><span style="color:var(--purple)">🃏回想</span></div><div class="skill-name">${def.recall.name}</div><div class="skill-desc">${def.recall.desc}</div></button>`;
  html+='</div>';
  panel.innerHTML=hdr+html;
}

function playerSkill(idx){
  const e=GS.turnQueue[GS.turnIdx];
  const c=GS.battle.teams[e.ti][e.ci];
  const def=CHAR_DEFS[c.id];
  const sk=def.skills[idx];
  const tax=c.debuffs.find(d=>d.type==='season_tax');
  const expensive=c.debuffs.find(d=>d.type==='expensive');
  const realCost=sk.cost+(tax?tax.val:0)+(expensive?expensive.val:0);
  if(c.stamina<realCost)return;
  if(sk.targetType==='single_enemy'){GS.awaiting={type:'skill',sk,actor:c};GS.phase='await_enemy';renderBattleUI();showPrompt('🎯 选择敌方目标');}
  else if(sk.targetType==='single_ally'){GS.awaiting={type:'skill_ally',sk,actor:c};GS.phase='await_ally';renderBattleUI();showPrompt('💙 选择友方目标');}
  else{execSkill(c,sk,null,realCost);}
}

function playerUlt(){
  const e=GS.turnQueue[GS.turnIdx];
  const c=GS.battle.teams[e.ti][e.ci];
  const def=CHAR_DEFS[c.id];
  const tt=def.ultimate.targetType;
  if(tt==='single_enemy'){GS.awaiting={type:'ult',actor:c};GS.phase='await_enemy';renderBattleUI();showPrompt('🎯 扫头/选择目标');}
  else{execUlt(c,null);}
}

function playerRecall(){
  const e=GS.turnQueue[GS.turnIdx];
  const c=GS.battle.teams[e.ti][e.ci];
  const def=CHAR_DEFS[c.id];
  if(c.recallUsed)return;
  c.recallUsed=true;
  def.recall.use(GS.battle,c);
  renderBattleUI();renderActionPanel(c);
}

function showPrompt(msg){
  document.getElementById('action-panel').innerHTML=`<div class="action-panel-title">选择目标</div><div class="target-prompt">${msg}</div><div style="margin-top:10px"><button class="btn btn-secondary" onclick="cancelAwaiting()">取消</button></div>`;
}

function cancelAwaiting(){GS.awaiting=null;GS.phase='player_turn';const e=GS.turnQueue[GS.turnIdx];const c=GS.battle.teams[e.ti][e.ci];renderBattleUI();renderActionPanel(c);}

function onCharClick(ti,ci){
  if(!GS.awaiting)return;
  const clicked=GS.battle.teams[ti][ci];
  if(!clicked.alive)return;
  const {type,sk,actor}=GS.awaiting;
  const actorTi=GS.battle.teams[0].some(x=>x._uid===actor._uid)?0:1;
  const isSameTeam=ti===actorTi;
  if(GS.phase==='await_enemy'&&isSameTeam)return;
  if(GS.phase==='await_ally'&&!isSameTeam)return;
  GS.awaiting=null;
  if(type==='ult'){execUlt(actor,[clicked]);}
  else if(type==='skill'||type==='skill_ally'){
    const tax=actor.debuffs.find(d=>d.type==='season_tax');
    const expensive=actor.debuffs.find(d=>d.type==='expensive');
    const realCost=sk.cost+(tax?tax.val:0)+(expensive?expensive.val:0);
    execSkill(actor,sk,[clicked],realCost);
  }
}

function execSkill(c,sk,targets,realCost){
  c.stamina-=realCost||sk.cost;
  c.triggerValue=Math.min(c.triggerValue+sk.tv,TRIGGER_MAX);
  let T=targets;
  if(!T){
    if(sk.targetType==='all_enemies')T=GS.battle.getEnemies(c);
    else if(sk.targetType==='all_allies')T=GS.battle.getTeam(c).filter(a=>a.alive);
    else if(sk.targetType==='self')T=[c];
  }
  sk.use(GS.battle,c,T||[]);
  finishTurn(c);
}

function execUlt(c,targets){
  const def=CHAR_DEFS[c.id];
  const freeUlt=c.buffs.find(b=>b.type==='free_ult');
  if(freeUlt)c.buffs=c.buffs.filter(b=>b.type!=='free_ult');
  else c.triggerValue=0;
  let T=targets;
  if(!T){
    if(def.ultimate.targetType==='all_enemies')T=GS.battle.getEnemies(c);
    else if(def.ultimate.targetType==='all_allies')T=GS.battle.getTeam(c).filter(a=>a.alive);
    else if(def.ultimate.targetType==='self')T=[c];
    else T=GS.battle.getEnemies(c);
  }
  def.ultimate.use(GS.battle,c,T);
  finishTurn(c);
}

function finishTurn(c){
  GS.phase='idle';GS.awaiting=null;
  if(GS.battle.checkWin()){endBattle();return;}
  GS.turnIdx++;renderBattleUI();setTimeout(advanceTurn,200);
}

// ============================================================
// AI
// ============================================================
function aiTurn(c){
  const def=CHAR_DEFS[c.id];
  const tax=c.debuffs.find(d=>d.type==='season_tax');
  const expensive=c.debuffs.find(d=>d.type==='expensive');
  const taxVal=tax?tax.val:0;const xtraVal=expensive?expensive.val:0;
  // Try ultimate first
  const reqTV=def.ultimate.tv||TRIGGER_MAX;
  if(c.triggerValue>=reqTV){
    c.triggerValue=0;
    let T=GS.battle.getEnemies(c).filter(e=>e.alive);
    if(def.ultimate.targetType==='single_enemy')T=[T.reduce((a,b)=>a.hp<b.hp?a:b)];
    else if(def.ultimate.targetType==='all_allies')T=GS.battle.getTeam(c).filter(a=>a.alive);
    else if(def.ultimate.targetType==='self')T=[c];
    def.ultimate.use(GS.battle,c,T);
    GS.battle.log(`${c.name} 大招发动！`,'ultimate');
  }
  // Use best affordable skill
  const usable=def.skills.filter(sk=>c.stamina>=(sk.cost+taxVal+xtraVal)).sort((a,b)=>b.cost-a.cost);
  if(usable.length){
    const sk=usable[0];
    const realCost=sk.cost+taxVal+xtraVal;
    c.stamina-=realCost;
    c.triggerValue=Math.min(c.triggerValue+sk.tv,TRIGGER_MAX);
    let T;
    if(sk.targetType==='single_enemy'){const es=GS.battle.getEnemies(c).filter(e=>e.alive);T=es.length?[es.reduce((a,b)=>a.hp<b.hp?a:b)]:[];}
    else if(sk.targetType==='all_enemies')T=GS.battle.getEnemies(c).filter(e=>e.alive);
    else if(sk.targetType==='all_allies')T=GS.battle.getTeam(c).filter(a=>a.alive);
    else if(sk.targetType==='single_ally'){const as=GS.battle.getTeam(c).filter(a=>a.alive&&a._uid!==c._uid);T=as.length?[as.reduce((a,b)=>a.hp<b.hp?a:b)]:[c];}
    else if(sk.targetType==='self')T=[c];
    if(T&&T.length)sk.use(GS.battle,c,T);
  } else if(!c.recallUsed&&Math.random()<.25){
    c.recallUsed=true;
    def.recall.use(GS.battle,c);
  } else GS.battle.log(`${c.name} 蓄力中...`,'combat');
  if(GS.battle.checkWin()){endBattle();return;}
  GS.turnIdx++;renderBattleUI();setTimeout(advanceTurn,250);
}

// ============================================================
// RENDER BATTLE UI
// ============================================================
function renderBattleUI(){
  renderTeam(0,'team1-battle',false);
  renderTeam(1,'team2-battle',true);
  renderLog();
}

function renderTeam(ti,cid,isEnemy){
  const con=document.getElementById(cid);
  const team=GS.battle.teams[ti];
  const entry=GS.turnIdx<GS.turnQueue.length?GS.turnQueue[GS.turnIdx]:null;
  con.innerHTML='';
  team.forEach((c,ci)=>{
    const isActor=entry&&entry.ti===ti&&entry.ci===ci;
    const isTarget=(GS.phase==='await_enemy'&&isEnemy)||(GS.phase==='await_ult'&&isEnemy);
    const isAlly=GS.phase==='await_ally'&&!isEnemy;
    const div=document.createElement('div');
    div.className=`battle-char ${c.alive?'':'dead'} ${isActor?'active-actor':''} ${isTarget?'active-target':''} ${isAlly?'ally-target':''}`.replace(/\s+/g,' ').trim();
    if((isTarget||isAlly)&&c.alive)div.onclick=()=>onCharClick(ti,ci);
    const hpPct=Math.max(0,(c.hp/c.maxHp)*100);
    const spPct=Math.min(100,(c.shield/Math.max(c.maxHp,1))*100);
    const hpCls=hpPct>50?'':hpPct>25?'warn':'crit';
    let dots='';for(let i=0;i<Math.min(c.maxStamina,10);i++)dots+=`<div class="stamina-dot ${i<c.stamina?'filled':''}"></div>`;
    const tvCls=c.triggerValue>=(CHAR_DEFS[c.id].ultimate?.tv||TRIGGER_MAX)?'ready':'';
    const bBadges=c.buffs.filter(b=>b.dur!==0).slice(0,5).map(b=>{const n={skill_up:'技能↑',saint_mode:'圣人',kidney_warrior:'肾斗士',crit_sure:'必暴',dodge_up:'闪避↑',omega_domain:'Ω域',usogui:'Usogui',ap_plus:'AP+',egg_power:'卤蛋↑',free_ult:'免费大招',abyss_guaranteed:'渊印保',consul:'执政官',trinity:'合体',tiga_domain:'迪迦域',royal_domain:'王域',time_snipe:'时间狙',quantum_state:'量子态',quantum_collapse:'量子稳定',dirac_domain:'狄拉克域',xeno_domain:'吞噬域',info_domain:'信息域',absolute_foresight:'绝对预知',stardust:'星尘',reflect_shield:'反弹盾',undying:'免死',premium:'高级',season_pass:'季票',parasite_mirror:'镜像',parasite_kill:'寄生击杀',terminus:'终局',charged_shot:'强化射击',first_action:'优先行动',true_resist:'真伤抵抗',power_form:'巨力形',speed_form:'速度形',star_burst:'星蚀爆发',sure_hit:'必中',info_counter:'信息反击'}[b.type]||b.type;return`<span class="status-badge buff">${n}${b.dur&&b.dur!==999?`(${b.dur})`:'∞'}</span>`}).join('');
    const dBadges=c.debuffs.slice(0,5).map(d=>{const n={stun:'眩晕',freeze:'冰冻',doubt:'Doubt',silence:'沉默',fear:'恐惧',dmg_down:'伤↓',taunted:'嘲讽',marked:'标记',bleed:'持伤',burn:'灼烧',spore:'孢云',tv_slow:'触↓',duel_mark:'决斗',residual_echo:'残响',offstage:'退场',revolution:'革命',gravity:'重力',discord:'混乱',hourglass:'沙漏',time_trap:'时间陷阱',time_seal:'时封',no_ult:'封招',expensive:'涨价',season_tax:'税收',recall_blocked:'回想封',cognitive_disorder:'认知错乱',paradox:'悖论',dream_poison:'梦毒',atom_mark:'原子',atom_invasion:'侵入',blind:'致盲',cursed_rng:'诅咒',heal_cut:'回复↓',overheat:'僵直',stardust_exposed:'星尘暴露'}[d.type]||d.type;return`<span class="status-badge debuff">${n}(${d.dur||1})</span>`}).join('');
    div.innerHTML=`<div class="char-row-top"><div class="char-emoji-sm">${c.alive?c.emoji:'💀'}</div><div class="char-info-sm"><div class="name">${c.name.replace(/ (SSSSR\+?|SSSR|SSR|SR|SP|UR|God|AT)$/,'')}</div><div class="rarity rarity-${c.rarity}">${c.rarity}</div></div><div class="char-stats-right"><div class="stamina-dots">${dots}</div><div class="trigger-val ${tvCls}">⚡${c.triggerValue}</div></div></div><div class="hp-bar-wrap"><div class="bar-labels"><span>HP ${c.hp}/${c.maxHp}</span><span>${c.shield>0?`🛡${c.shield}`:''}</span></div><div class="bar-track"><div class="bar-fill hp-fill ${hpCls}" style="width:${hpPct}%"></div></div>${c.shield>0?`<div class="bar-track" style="height:5px;margin-top:2px"><div class="bar-fill shield-fill" style="width:${spPct}%"></div></div>`:''}</div>${bBadges||dBadges?`<div class="status-row">${bBadges}${dBadges}</div>`:''}`;
    con.appendChild(div);
  });
}

function renderLog(){
  const log=document.getElementById('battle-log');
  log.innerHTML='';
  GS.battle.logs.slice(-60).forEach(e=>{const d=document.createElement('div');d.className=`log-entry ${e.type}`;d.textContent=e.txt;log.appendChild(d);});
  log.scrollTop=log.scrollHeight;
}

// ============================================================
// END BATTLE
// ============================================================
function endBattle(){
  renderBattleUI();
  const rs=document.getElementById('result-screen');
  const rt=document.getElementById('result-title');
  const rsub=document.getElementById('result-sub');
  rs.style.display='flex';
  if(GS.battle.winner===0){rt.textContent='🏆 胜利！';rt.className='result-title win';rsub.textContent='玩家队取得胜利！对手已被击败！';}
  else if(GS.battle.winner===1){rt.textContent='💀 败北';rt.className='result-title lose';rsub.textContent='敌方队获胜……再接再厉！';}
  else{rt.textContent='⚔️ 平局';rt.className='result-title draw';rsub.textContent='势均力敌！或Scriptwriter「Bad Ending」触发！';}
}

showTitle();
</script>
